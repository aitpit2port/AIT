lor:#fff;box-shadow:0 10px 20px rgba(253,72,14,.18)}.tb-btn:disabled{opacity:.55;cursor:not-allowed}.tb-btn.spinning .spin-mini{animation:spin .8s linear infinite}.filterbar{background:var(--card);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;gap:8px;align-items:center;flex-wrap:wrap}.fl{font-size:10px;font-weight:900;color:var(--text2);text-transform:uppercase;letter-spacing:.6px}.fs{min-width:138px;height:36px}.fs:focus,.searchbox:focus{border-color:var(--accent)}.searchbox{min-width:220px}.btn-clear{margin-left:auto}.badge-count{background:var(--accent);color:#fff;border-radius:7px;padding:4px 8px;font-size:10px;font-weight:900;display:none}.content{padding:16px}.kpi-grid{display:grid;grid-template-columns:repeat(8,minmax(0,1fr));gap:12px;margin-bottom:14px}@media(max-width:1320px){.kpi-grid{grid-template-columns:repeat(4,1fr)}}@media(max-width:700px){.kpi-grid{grid-template-columns:repeat(2,1fr)}}.kc{background:linear-gradient(180deg,var(--card),var(--card3));border:1px solid var(--border);border-radius:var(--radius);padding:13px 14px;box-shadow:var(--shadow);border-top:3px solid transparent;min-height:94px}.kc.orange{border-top-color:var(--accent)}.kc.green{border-top-color:var(--green)}.kc.red{border-top-color:var(--red)}.kc.blue{border-top-color:var(--blue)}.kc.yellow{border-top-color:var(--yellow)}.kc.purple{border-top-color:var(--purple)}.kc-lbl{font-size:9px;color:var(--text2);font-weight:900;letter-spacing:.65px;text-transform:uppercase}.kc-val{font-size:23px;font-weight:950;margin-top:8px;line-height:1.05;word-break:break-word}.kc-val.orange{color:var(--accent)}.kc-val.green{color:var(--green)}.kc-val.red{color:var(--red)}.kc-val.blue{color:var(--blue)}.kc-val.yellow{color:var(--yellow)}.kc-val.purple{color:var(--purple)}.kc-note{font-size:10px;color:var(--text2);margin-top:6px;line-height:1.35}.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-bottom:14px}.grid2{display:grid;grid-template-columns:1.1fr .9fr;gap:14px;margin-bottom:14px}@media(max-width:1000px){.grid3,.grid2{grid-template-columns:1fr}}.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}.card-head{padding:12px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:10px}.card-head h3{font-size:12px;font-weight:900}.card-head span{font-size:10px;color:var(--text2)}.card-body{padding:12px 14px}.chart{height:235px;position:relative}.table-wrap{overflow:auto;max-height:520px}.data-table{width:100%;border-collapse:collapse;min-width:860px}.data-table th{position:sticky;top:0;z-index:1;background:var(--card2);color:var(--accent);text-align:left;font-size:9px;letter-spacing:.55px;text-transform:uppercase;font-weight:900;padding:9px 11px;border-bottom:1px solid var(--border);white-space:nowrap}.data-table td{padding:9px 11px;border-bottom:1px solid var(--border);font-size:11px;color:var(--text);vertical-align:top}.data-table tr:hover td{background:var(--card2)}.td-r{text-align:right}.td-b{font-weight:900}.td-s{font-size:10px;color:var(--text2)}.pill{display:inline-flex;align-items:center;border-radius:99px;padding:3px 9px;font-size:10px;font-weight:900;background:rgba(56,189,248,.12);color:var(--blue);white-space:nowrap}.pill.good{background:rgba(34,197,94,.12);color:var(--green)}.pill.warn{background:rgba(245,158,11,.12);color:var(--yellow)}.pill.bad{background:rgba(239,68,68,.12);color:var(--red)}.empty{padding:34px;text-align:center;color:var(--text2);line-height:1.8}.load{position:fixed;inset:0;background:rgba(11,17,24,.86);backdrop-filter:blur(5px);z-index:100;display:flex;align-items:center;justify-content:center;text-align:center}.load.hidden{display:none}.spinner{width:46px;height:46px;border-radius:50%;border:3px solid var(--border);border-top-color:var(--accent);animation:spin .8s linear infinite;margin:0 auto 13px}@keyframes spin{to{transform:rotate(360deg)}}.errbox{display:none;margin-bottom:14px;background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.35);border-radius:12px;padding:12px 14px;color:var(--red);font-weight:800}.statusbar{position:fixed;left:0;right:0;bottom:0;z-index:30;background:var(--card);border-top:1px solid var(--border);display:flex;align-items:center;gap:10px;padding:8px 16px;color:var(--text2);font-size:11px}.dot{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green)}.dot.red{background:var(--red);box-shadow:0 0 8px var(--red)}.dot.yellow{background:var(--yellow);box-shadow:0 0 8px var(--yellow)}@media(max-width:720px){.topbar{flex-wrap:wrap}.tb-spacer{display:none}.tb-info{order:4;width:100%}.filterbar{align-items:stretch}.fs,.searchbox,.tb-btn{width:100%;justify-content:center}.btn-clear{margin-left:0}.content{padding:12px}.chart{height:260px}}[dir=rtl] .data-table th,[dir=rtl] .data-table td{text-align:right}[dir=rtl] .td-r{text-align:left}[dir=rtl] .btn-clear{margin-left:0;margin-right:auto}

<body>

  </section>

</main>
<div class="statusbar"><span class="dot" id="sDot"></span><span id="sText">Connecting...</span><span style="margin-left:auto" id="sCount"></span></div>
<script>
if (window.ChartDataLabels) Chart.register(ChartDataLabels);
const DEFAULT_API_URL='https://script.google.com/macros/s/AKfycbxFJroZzKQT1N0c70ktzFISQkWIkT7w_pyi7eAFxuDPx88icN-WvT2IGkrJ8W-Lt1uz/exec';
const __apiQs=new URLSearchParams(location.search);
const API_URL=__apiQs.get('api')||localStorage.getItem('ait_api_url')||DEFAULT_API_URL;
if(__apiQs.get('api')) localStorage.setItem('ait_api_url',__apiQs.get('api'));
const PAGE={"title": {"en": "Approvals", "ar": "الاعتمادات والموافقات", "zh": "审批"}, "sub": {"en": "Requests, approvals, pending actions and bottlenecks", "ar": "الطلبات والموافقات والإجراءات المعلقة ونقاط التعطل", "zh": "请求、审批、待办事项和瓶颈"}, "module": "approvals", "kpis": ["TOTAL REQUESTS", "APPROVED", "PENDING", "REJECTED", "OVERDUE", "AVG DAYS", "APPROVERS", "LAST UPDATE"], "charts": ["Approval Status", "Approvals by Department", "Cycle Time Trend"], "table": "Approval Log"};
const I18N={en:{refresh:'Refresh',exportExcel:'Export Excel',all:'All',dateRange:'Date',category:'Category',mine:'Mine',clear:'Clear',loading:'Loading data...',syncing:'Syncing latest data...',noData:'No data available yet',apiNotReady:'API module is not ready yet',rows:'rows',live:'Live data',search:'Search',auth:'Please login again'},ar:{refresh:'تحديث',exportExcel:'تصدير Excel',all:'الكل',dateRange:'التاريخ',category:'التصنيف',mine:'المنجم',clear:'مسح',loading:'جاري تحميل البيانات...',syncing:'جاري مزامنة آخر البيانات...',noData:'لا توجد بيانات متاحة حاليًا',apiNotReady:'واجهة البيانات لهذه الصفحة لم تجهز بعد',rows:'صفوف',live:'بيانات مباشرة',search:'بحث',auth:'برجاء تسجيل الدخول مرة أخرى'},zh:{refresh:'刷新',exportExcel:'导出 Excel',all:'全部',dateRange:'日期',category:'分类',mine:'矿区',clear:'清除',loading:'正在加载数据...',syncing:'正在同步最新数据...',noData:'暂无可用数据',apiNotReady:'此页面的数据接口尚未准备好',rows:'行',live:'实时数据',search:'搜索',auth:'请重新登录'}};
let LANG=localStorage.getItem('ait_lang')||'en',THEME=localStorage.getItem('ait_theme')||'dark',RAW=null,ROWS=[],FILTERED=[],CHARTS={};
const PAL=['#fd480e','#22c55e','#38bdf8','#f59e0b','#a78bfa','#ec4899','#14b8a6','#f97316','#84cc16','#06b6d4','#8b5cf6','#10b981'];
function tr(k){return (I18N[LANG]&&I18N[LANG][k])||I18N.en[k]||k}function tx(o){return (o&&o[LANG])||o?.en||o||''}function safe(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}function num(v){if(v==null||v==='')return 0;let x=parseFloat(String(v).replace(/,/g,'').replace(/[^0-9.\-]/g,''));return isNaN(x)?0:x}function fmt(v){v=num(v);return Math.abs(v)>=1e9?(v/1e9).toFixed(1)+'B':Math.abs(v)>=1e6?(v/1e6).toFixed(1)+'M':Math.abs(v)>=1e3?(v/1e3).toFixed(1)+'K':Number.isInteger(v)?String(v):v.toFixed(1)}function asDate(v){if(!v)return '';let s=String(v).trim();let d=new Date(s);if(!isNaN(d))return d.toISOString().slice(0,10);let m=s.match(/(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})/);return m?`${m[3]}-${m[2].padStart(2,'0')}-${m[1].padStart(2,'0')}`:s.slice(0,10)}
function getSession(){try{return JSON.parse(localStorage.getItem('ait_auth_session')||'null')}catch(e){return null}}function getToken(){const q=new URLSearchParams(location.search);return q.get('token')||(getSession()&&getSession().token)||''}function hasSession(){return !!getToken()}
function applyI18n(){document.querySelectorAll('[data-i18n]').forEach(el=>el.textContent=tr(el.dataset.i18n));document.getElementById('pageTitle').textContent=tx(PAGE.title);document.getElementById('pageSub').textContent=tx(PAGE.sub);document.getElementById('langSel').value=LANG;document.documentElement.lang=LANG;document.documentElement.dir=LANG==='ar'?'rtl':'ltr';document.getElementById('hChart1').textContent=PAGE.charts[0]||'';document.getElementById('hChart2').textContent=PAGE.charts[1]||'';document.getElementById('hChart3').textContent=PAGE.charts[2]||'';render()}function setLang(l){LANG=l;localStorage.setItem('ait_lang',l);applyI18n()}function toggleTheme(){THEME=THEME==='dark'?'light':'dark';localStorage.setItem('ait_theme',THEME);document.documentElement.setAttribute('data-theme',THEME);document.getElementById('themeBtn').textContent=THEME==='dark'?'🌙':'☀️';renderCharts()}
function apiCall(module,action='data'){return new Promise((resolve,reject)=>{const cb='ait_'+Date.now()+'_'+Math.random().toString(36).slice(2);const s=document.createElement('script');let done=false;const cleanup=()=>{done=true;delete window[cb];if(s.parentNode)s.parentNode.removeChild(s)};window[cb]=data=>{cleanup();resolve(data)};s.onerror=()=>{if(!done){cleanup();reject(new Error('Connection failed'))}};setTimeout(()=>{if(!done){cleanup();reject(new Error('Timeout'))}},60000);const q=new URLSearchParams({module,action,callback:cb,t:Date.now()});const token=getToken();if(token)q.set('token',token);s.src=API_URL+'?'+q.toString();document.body.appendChild(s)})}
async function loadData(action='data'){setStatus('yellow',action==='data'?tr('loading'):tr('syncing'));document.getElementById('loadMsg').textContent=action==='data'?tr('loading'):tr('syncing');document.getElementById('pageLoad').classList.remove('hidden');document.getElementById('errBox').style.display='none';try{if(!hasSession())throw new Error(tr('auth'));const res=await apiCall(PAGE.module,action);if(!res||res.error||res.ok===false)throw new Error(res?.message||tr('apiNotReady'));RAW=res;ROWS=extractRows(res);populateFilters();applyFilters();document.getElementById('lastUpdate').textContent='🕐 '+(res.lastUpdated||res.serverTime||new Date().toLocaleString());setStatus('ok',tr('live')+' — '+FILTERED.length+' '+tr('rows'))}catch(e){RAW=null;ROWS=[];FILTERED=[];render();showError(e.message||String(e));setStatus('error',e.message||tr('apiNotReady'));if(/login|session|auth|expired/i.test(e.message||'')){setTimeout(()=>{if(parent===window)location.href='auth.html'},900)}}finally{document.getElementById('pageLoad').classList.add('hidden')}}
async function refreshData(){const b=document.getElementById('btnRefresh');b.disabled=true;b.classList.add('spinning');await loadData('sync');b.disabled=false;b.classList.remove('spinning')}function showError(msg){const e=document.getElementById('errBox');e.textContent=msg;e.style.display='block'}
function extractRows(res){const keys=[PAGE.module,'data','rows','items','records','table'];for(const k of keys){if(Array.isArray(res[k]))return res[k];if(res[k]&&Array.isArray(res[k].rows))return res[k].rows;if(res[k]&&Array.isArray(res[k].items))return res[k].items;if(res[k]&&Array.isArray(res[k].records))return res[k].records}return[]}
function rowCat(r){return r.category||r.status||r.type||r.source_type||r.department||r.vendor_status||r.item||r.Item||''}function rowMine(r){return r.mine||r.mine_name||r.Project||r.project||r.source_sheet||''}function rowText(r){return Object.values(r||{}).join(' ').toLowerCase()}function rowDate(r){return asDate(r.date||r.Date||r.created_at||r.due_date||r.month||r.Month||r.Timestamp)}
function populateFilters(){const cat=document.getElementById('fCategory'),mine=document.getElementById('fMine');const curC=cat.value||'all',curM=mine.value||'all';const cats=[...new Set(ROWS.map(rowCat).filter(Boolean))].sort();const mines=[...new Set(ROWS.map(rowMine).filter(Boolean))].sort();cat.innerHTML='<option value="all">'+tr('all')+'</option>'+cats.map(x=>`<option value="${safe(x)}">${safe(x)}</option>`).join('');mine.innerHTML='<option value="all">'+tr('all')+'</option>'+mines.map(x=>`<option value="${safe(x)}">${safe(x)}</option>`).join('');cat.value=cats.includes(curC)?curC:'all';mine.value=mines.includes(curM)?curM:'all'}
function applyFilters(){const q=(document.getElementById('fSearch').value||'').toLowerCase().trim(),c=document.getElementById('fCategory').value,m=document.getElementById('fMine').value,df=document.getElementById('fFrom').value,dt=document.getElementById('fTo').value;FILTERED=ROWS.filter(r=>{const d=rowDate(r);if(q&&rowText(r).indexOf(q)<0)return false;if(c!=='all'&&rowCat(r)!==c)return false;if(m!=='all'&&rowMine(r)!==m)return false;if(df&&d<df)return false;if(dt&&d>dt)return false;return true});const ac=[q,c,m,df,dt].filter(v=>v&&v!=='all').length;const badge=document.getElementById('activeBadge');badge.style.display=ac?'inline-flex':'none';badge.textContent=ac+' active';render()}
function clearFilters(){document.getElementById('fSearch').value='';['fCategory','fMine'].forEach(id=>document.getElementById(id).value='all');document.getElementById('fFrom').value='';document.getElementById('fTo').value='';applyFilters()}
function render(){renderKPIs();renderCharts();renderTable();document.getElementById('sCount').textContent=FILTERED.length+' / '+ROWS.length+' '+tr('rows')}
function computeKPIs(){const nums=FILTERED.map(r=>num(r.amount||r.total||r.value||r.qty||r.cost||r.budget||r.score||r.Transfer_Amount||r.Amount)).filter(x=>x!==0);const total=nums.reduce((a,b)=>a+b,0);const status=(re)=>FILTERED.filter(r=>re.test(String(rowCat(r)+' '+(r.status||'')))).length;const done=status(/approved|paid|done|closed|active|pass|accepted|complete/i);const bad=status(/rejected|overdue|delayed|high|fail|black|risk|critical/i);const cats=new Set(FILTERED.map(rowCat).filter(Boolean));const mines=new Set(FILTERED.map(rowMine).filter(Boolean));const dates=FILTERED.map(rowDate).filter(Boolean).sort();return[{v:FILTERED.length,n:'records'},{v:fmt(total),n:'numeric total'},{v:done,n:'positive / closed'},{v:bad,n:'alerts / issues'},{v:mines.size,n:'groups / mines'},{v:nums.length?fmt(total/nums.length):'—',n:'average value'},{v:cats.size,n:'categories'},{v:dates[dates.length-1]||'—',n:'latest date'}]}
function renderKPIs(){const k=computeKPIs(),colors=['orange','blue','green','red','yellow','purple','blue','orange'];document.getElementById('kpiGrid').innerHTML=(PAGE.kpis||[]).map((label,i)=>{const item=k[i]||{v:'—',n:''},c=colors[i%colors.length];return `<article class="kc ${c}"><div class="kc-lbl">${safe(label)}</div><div class="kc-val ${c}">${safe(item.v)}</div><div class="kc-note">${safe(item.n)}</div></article>`}).join('')}
function gc(){const cs=getComputedStyle(document.documentElement);return{grid:cs.getPropertyValue('--chart-grid').trim(),txt:cs.getPropertyValue('--chart-txt').trim()}}function mkChart(id,type,labels,datasets,extra={}){if(CHARTS[id])CHARTS[id].destroy();const el=document.getElementById(id);if(!el)return;const {grid,txt}=gc();CHARTS[id]=new Chart(el,{type,data:{labels,datasets},options:{responsive:true,maintainAspectRatio:false,animation:{duration:260},plugins:{legend:{display:extra.legend??true,labels:{color:txt,boxWidth:10,font:{size:10}}},tooltip:{backgroundColor:'#07101f',borderColor:'#fd480e',borderWidth:1,titleColor:'#fd480e',bodyColor:'#e8ecf2',padding:10},datalabels:extra.datalabels??{display:false}},scales:(type==='doughnut'||type==='pie')?{}:{x:{grid:{color:grid},ticks:{color:txt,font:{size:10},maxRotation:35}},y:{grid:{color:grid},ticks:{color:txt,font:{size:10},callback:v=>fmt(v)}}}}})}
function renderCharts(){const group={};FILTERED.forEach(r=>{const k=rowMine(r)||rowCat(r)||'Other';group[k]=(group[k]||0)+Math.abs(num(r.qty||r.amount||r.total||r.value||r.cost||1))});const top=Object.keys(group).sort((a,b)=>group[b]-group[a]).slice(0,10);mkChart('c1','bar',top.length?top:['—'],[{label:PAGE.charts[0]||'',data:top.length?top.map(k=>group[k]):[0],backgroundColor:'rgba(253,72,14,.82)',borderRadius:6}],{legend:false});document.getElementById('sChart1').textContent=top.length+' groups';const cats={};FILTERED.forEach(r=>{const k=rowCat(r)||'Other';cats[k]=(cats[k]||0)+1});const catKeys=Object.keys(cats).sort((a,b)=>cats[b]-cats[a]).slice(0,12);mkChart('c2','doughnut',catKeys.length?catKeys:['No data'],[{data:catKeys.length?catKeys.map(k=>cats[k]):[1],backgroundColor:PAL.map(c=>c+'cc'),borderWidth:1}],{legend:true});document.getElementById('sChart2').textContent=catKeys.length+' categories';const daily={};FILTERED.forEach(r=>{const d=rowDate(r);if(!d)return;daily[d]=(daily[d]||0)+Math.abs(num(r.qty||r.amount||r.total||r.value||r.cost||1))});const days=Object.keys(daily).sort().slice(-30);mkChart('c3','line',days.length?days:['—'],[{label:PAGE.charts[2]||'',data:days.length?days.map(d=>daily[d]):[0],borderColor:'#fd480e',backgroundColor:'rgba(253,72,14,.13)',fill:true,tension:.35,pointRadius:3}],{legend:false});document.getElementById('sChart3').textContent=days.length+' dates'}
function pickKeys(rows){const priority=['date','Date','mine','mine_name','vendor','Contractor_Name','batch','category','status','source_type','amount','Amount','qty','cost','score','notes','source_sheet','source_row'];const all=[];rows.slice(0,80).forEach(r=>Object.keys(r||{}).forEach(k=>{if(!all.includes(k))all.push(k)}));return priority.filter(k=>all.includes(k)).concat(all.filter(k=>!priority.includes(k))).slice(0,10)}function cellClass(k){return /amount|total|value|qty|cost|score|pct|rate|budget|spent|remaining/i.test(k)?'td-r td-b':'td-s'}function cellHtml(k,v){const val=v==null||v===''?'—':String(v).slice(0,120);if(/status|category|type|source_type/i.test(k)){let cls=/fail|reject|risk|overdue|delay|critical/i.test(val)?'bad':/pending|progress|medium|open/i.test(val)?'warn':/pass|approved|paid|done|active|complete/i.test(val)?'good':'';return `<td><span class="pill ${cls}">${safe(val)}</span></td>`}return `<td class="${cellClass(k)}">${safe(val)}</td>`}function renderTable(){const head=document.getElementById('tHead'),body=document.getElementById('tBody');document.getElementById('hTable').textContent=PAGE.table||'Table';document.getElementById('tableCount').textContent=FILTERED.length+' '+tr('rows');if(!FILTERED.length){head.innerHTML='';body.innerHTML=`<tr><td class="empty">${tr('noData')}<br><span style="color:var(--text3)">${tr('apiNotReady')}</span></td></tr>`;return}const keys=pickKeys(FILTERED);head.innerHTML='<tr>'+keys.map(k=>'<th>'+safe(k.replace(/_/g,' '))+'</th>').join('')+'</tr>';body.innerHTML=FILTERED.slice(0,400).map(r=>'<tr>'+keys.map(k=>cellHtml(k,r[k])).join('')+'</tr>').join('')}
function exportExcel(){if(!FILTERED.length){alert(tr('noData'));return}const wb=XLSX.utils.book_new();const ws=XLSX.utils.json_to_sheet(FILTERED);XLSX.utils.book_append_sheet(wb,ws,(tx(PAGE.title)||PAGE.module).slice(0,30));XLSX.writeFile(wb,'AIT_'+PAGE.module+'_'+new Date().toISOString().slice(0,10)+'.xlsx')}function setStatus(type,msg){document.getElementById('sDot').className='dot'+(type==='error'?' red':type==='yellow'?' yellow':'');document.getElementById('sText').textContent=msg}
window.addEventListener('DOMContentLoaded',()=>{document.documentElement.setAttribute('data-theme',THEME);document.getElementById('themeBtn').textContent=THEME==='dark'?'🌙':'☀️';applyI18n();loadData('data')});
</script>
