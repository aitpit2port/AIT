<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="dark"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>AIT — Login / Permissions</title><style>
:root{--bg:#0b1118;--card:#111827;--card2:#1a2235;--border:#1e2d40;--text:#e8ecf2;--text2:#8892a4;--text3:#4b5a6e;--accent:#fd480e;--accent2:#ff6b35;--accentbg:rgba(253,72,14,.12);--green:#22c55e;--greenbg:rgba(34,197,94,.12);--red:#ef4444;--redbg:rgba(239,68,68,.12);--blue:#38bdf8;--bluebg:rgba(56,189,248,.12);--yellow:#f59e0b;--yellowbg:rgba(245,158,11,.12);--purple:#a78bfa;--purplebg:rgba(167,139,250,.12);--shadow:0 2px 12px rgba(0,0,0,.4);--radius:10px;--chart-grid:rgba(255,255,255,.04);--chart-txt:#8892a4}[data-theme=light]{--bg:#f0f2f5;--card:#fff;--card2:#f8f9fc;--border:#e1e5eb;--text:#1a2030;--text2:#5a6478;--text3:#8b949e;--shadow:0 1px 8px rgba(0,0,0,.08);--chart-grid:rgba(0,0,0,.06);--chart-txt:#5a6478}*{box-sizing:border-box;margin:0;padding:0}html,body{min-height:100%;font-family:'Segoe UI',Arial,sans-serif;font-size:13px;background:var(--bg);color:var(--text);overflow-x:hidden;transition:.25s}::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}.topbar{background:var(--card);border-bottom:1px solid var(--border);padding:0 16px;height:52px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100;box-shadow:var(--shadow)}.tb-title{font-size:15px;font-weight:800;line-height:1}.tb-sub{font-size:10px;color:var(--text2);margin-top:3px}.tb-spacer{flex:1}.tb-info{font-size:11px;color:var(--text2);background:var(--card2);border:1px solid var(--border);border-radius:6px;padding:5px 10px;white-space:nowrap}.tb-btn{display:flex;align-items:center;gap:5px;background:var(--card2);border:1px solid var(--border);border-radius:6px;padding:6px 11px;font-size:11px;font-weight:700;color:var(--text2);cursor:pointer;transition:.2s;white-space:nowrap;font-family:inherit}.tb-btn:hover{border-color:var(--accent);color:var(--accent)}.tb-btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}.tb-btn.primary:hover{background:var(--accent2)}.tb-btn.primary:disabled{opacity:.6;cursor:not-allowed}.tb-btn.primary.spinning svg{animation:spin .8s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}.filterbar{background:var(--card);border-bottom:1px solid var(--border);padding:8px 16px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}.fl{font-size:10px;font-weight:800;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;white-space:nowrap}.fs,.date-wrap input{background:var(--card2);border:1.5px solid var(--border);border-radius:6px;padding:6px 9px;font-size:11px;color:var(--text);cursor:pointer;outline:none;font-family:inherit}.fs{min-width:128px}.fs:focus,.date-wrap input:focus{border-color:var(--accent)}.date-wrap{display:flex;align-items:center;gap:5px}.date-sep{font-size:10px;color:var(--text2)}.btn-clear{background:none;border:1.5px solid var(--border);border-radius:6px;padding:6px 10px;font-size:11px;color:var(--text2);cursor:pointer;transition:.2s;margin-left:auto;font-family:inherit}.btn-clear:hover{border-color:var(--red);color:var(--red)}.active-badge{background:var(--accent);color:#fff;border-radius:4px;padding:2px 7px;font-size:10px;font-weight:800}.content{padding:14px 16px 72px}.kpi-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:10px;margin-bottom:14px}@media(max-width:1280px){.kpi-grid{grid-template-columns:repeat(4,1fr)}}@media(max-width:700px){.kpi-grid{grid-template-columns:repeat(2,1fr)}}.kc{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;border-top:3px solid transparent;transition:.2s}.kc:hover{transform:translateY(-2px);box-shadow:var(--shadow)}.kc.orange{border-top-color:var(--accent)}.kc.green{border-top-color:var(--green)}.kc.red{border-top-color:var(--red)}.kc.blue{border-top-color:var(--blue)}.kc.yellow{border-top-color:var(--yellow)}.kc.purple{border-top-color:var(--purple)}.kc-lbl{font-size:9px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;color:var(--text2);margin-bottom:6px}.kc-val{font-size:22px;font-weight:900;line-height:1}.kc-val.orange{color:var(--accent)}.kc-val.green{color:var(--green)}.kc-val.red{color:var(--red)}.kc-val.blue{color:var(--blue)}.kc-val.yellow{color:var(--yellow)}.kc-val.purple{color:var(--purple)}.kc-note{font-size:10px;color:var(--text2);margin-top:4px}.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:12px}.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}.g1{margin-bottom:12px}@media(max-width:980px){.g3,.g2{grid-template-columns:1fr}}.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}.card-head{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}.card-head h3{font-size:12px;font-weight:800}.card-head span{font-size:10px;color:var(--text2)}.card-body{padding:12px 14px}.ch{position:relative}.ch.h180{height:180px}.ch.h220{height:220px}.ch.h260{height:260px}.tbl-wrap{overflow-x:auto;max-height:430px;overflow-y:auto}table{width:100%;border-collapse:collapse;font-size:11px}thead th{background:var(--card2);color:var(--accent);font-size:9px;font-weight:800;letter-spacing:.6px;text-transform:uppercase;padding:8px 12px;text-align:left;border-bottom:1px solid var(--border);white-space:nowrap;position:sticky;top:0;z-index:2}tbody td{padding:8px 12px;border-bottom:1px solid var(--border);color:var(--text);vertical-align:middle}tbody tr:hover td{background:var(--card2)}.td-r{text-align:right}.td-b{font-weight:800}.td-s{font-size:10px;color:var(--text2)}.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:800;white-space:nowrap}.badge.good{background:var(--greenbg);color:var(--green)}.badge.warn{background:var(--yellowbg);color:var(--yellow)}.badge.bad{background:var(--redbg);color:var(--red)}.badge.info{background:var(--bluebg);color:var(--blue)}.page-load{position:fixed;inset:0;background:rgba(11,17,24,.92);display:flex;align-items:center;justify-content:center;z-index:9999;backdrop-filter:blur(4px)}.page-load.hidden{display:none}.ld-spin{width:48px;height:48px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 14px}.ld-msg{font-size:13px;color:var(--text2);text-align:center}.statusbar{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--border);padding:5px 16px;display:flex;align-items:center;gap:10px;font-size:10px;color:var(--text2);z-index:50}.s-dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 5px var(--green)}.s-dot.red{background:var(--red);box-shadow:0 0 5px var(--red)}.s-dot.yellow{background:var(--yellow);box-shadow:0 0 5px var(--yellow)}.empty{padding:26px;text-align:center;color:var(--text2);font-size:12px}.mini-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.mini{background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:12px}.mini-title{font-size:10px;text-transform:uppercase;color:var(--text2);font-weight:800;margin-bottom:6px}.mini-val{font-size:18px;font-weight:900;color:var(--accent)}
 .login{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}.box{width:min(460px,100%);background:var(--card);border:1px solid var(--border);box-shadow:var(--shadow);border-radius:16px;padding:26px}.brand{font-size:24px;font-weight:900;margin-bottom:4px}.sub{font-size:12px;color:var(--text2);margin-bottom:20px}label{display:block;font-size:10px;text-transform:uppercase;color:var(--text2);font-weight:800;margin:12px 0 6px}input,select{width:100%;background:var(--card2);border:1.5px solid var(--border);border-radius:8px;padding:11px;color:var(--text);outline:none}input:focus,select:focus{border-color:var(--accent)}.btn{width:100%;margin-top:18px;background:var(--accent);border:0;border-radius:8px;padding:12px;color:white;font-weight:900;cursor:pointer}.note{margin-top:14px;padding:12px;border:1px solid var(--yellow);background:var(--yellowbg);color:var(--yellow);border-radius:8px;font-size:11px;line-height:1.5}</style></head><body><div class="login"><div class="box"><div class="brand">AIT Dashboard</div><div class="sub">Login + Permissions shell for GitHub Pages</div><label>Email</label><input id="email" type="email" placeholder="name@company.com"><label>Role</label><select id="role"><option>Admin</option><option>Manager</option><option>Viewer</option></select><button class="btn" onclick="login()">Enter Dashboard</button><div class="note">This static page is a front-end access gate only. Real security must be enforced in Apps Script/API permissions before exposing sensitive data.</div></div></div><script>function login(){localStorage.setItem('ait_auth_role',document.getElementById('role').value);localStorage.setItem('ait_auth_email',document.getElementById('email').value||'guest');location.href='index.html';}</script></body></html>
