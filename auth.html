<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AIT Login</title>
<style>
:root{
  --bg:#090d14;--panel:#ffffff;--text:#202938;--muted:#687386;--accent:#ff471e;--accent2:#ff6b35;
  --border:#d8deea;--input:#f5f7fb;--danger:#ef4444;--green:#22c55e;--shadow:0 25px 80px rgba(0,0,0,.42);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Segoe UI',Arial,sans-serif;background:var(--bg);overflow:hidden;color:var(--text)}
body{display:flex;align-items:center;justify-content:center;min-height:100vh}

/* Animated mining background */
.mine-scene{position:fixed;inset:0;overflow:hidden;background:linear-gradient(180deg,#080c13 0%,#101827 45%,#16120f 100%)}
.mine-scene:before{content:"";position:absolute;inset:0;background:radial-gradient(circle at 50% 25%,rgba(255,104,49,.15),transparent 34%),radial-gradient(circle at 20% 90%,rgba(56,189,248,.10),transparent 35%);animation:skyPulse 5s ease-in-out infinite alternate}
@keyframes skyPulse{from{opacity:.65}to{opacity:1}}
.moon{position:absolute;right:12%;top:8%;width:70px;height:70px;border-radius:50%;background:#f4f1dc;box-shadow:0 0 45px rgba(244,241,220,.35);opacity:.85}
.mountains{position:absolute;left:0;right:0;bottom:0;height:58%;background:linear-gradient(160deg,#151b25,#0f141d);clip-path:polygon(0 85%,8% 58%,14% 74%,22% 38%,31% 70%,40% 28%,52% 76%,64% 42%,75% 70%,86% 36%,100% 78%,100% 100%,0 100%)}
.mountains.two{bottom:-6%;height:48%;background:linear-gradient(160deg,#0e141d,#080c12);opacity:.95;clip-path:polygon(0 72%,10% 55%,19% 70%,29% 45%,40% 78%,49% 52%,61% 76%,73% 48%,82% 71%,94% 48%,100% 62%,100% 100%,0 100%)}
.road{position:absolute;left:-10%;right:-10%;bottom:7%;height:70px;background:linear-gradient(180deg,#28231f,#171412);transform:skewY(-2deg);box-shadow:0 -12px 35px rgba(0,0,0,.25)}
.conveyor{position:absolute;left:43%;bottom:25%;width:330px;height:10px;background:#303948;border-radius:8px;transform:rotate(-18deg);transform-origin:left center;box-shadow:0 0 0 2px rgba(255,255,255,.04)}
.conveyor:before{content:"";position:absolute;inset:2px;background:repeating-linear-gradient(90deg,#596275 0 14px,#2d3544 14px 28px);animation:belt .55s linear infinite;border-radius:8px}
@keyframes belt{to{background-position:28px 0}}
.crusher{position:absolute;left:62%;bottom:26%;width:64px;height:88px;background:#273142;border:2px solid #41506a;border-radius:8px 8px 3px 3px;box-shadow:0 12px 20px rgba(0,0,0,.35)}
.crusher:before{content:"";position:absolute;left:9px;right:9px;top:14px;height:20px;background:#111827;border-radius:3px;animation:crush .35s ease-in-out infinite alternate}
@keyframes crush{from{transform:translateY(0)}to{transform:translateY(8px)}}
.dust{position:absolute;left:64%;bottom:36%;width:10px;height:10px;border-radius:50%;background:rgba(219,181,117,.4);box-shadow:18px -8px 0 rgba(219,181,117,.25),35px 5px 0 rgba(219,181,117,.2);animation:dust 2.2s ease-in-out infinite}
@keyframes dust{0%{opacity:0;transform:translate(0,0) scale(.5)}30%{opacity:1}100%{opacity:0;transform:translate(55px,-35px) scale(1.8)}}
.truck{position:absolute;bottom:10%;left:-170px;width:126px;height:48px;animation:truckMove 8s linear infinite}
.truck.t2{animation-delay:3.1s;bottom:15%;transform:scale(.78);filter:brightness(.82)}
.truck-body{position:absolute;left:24px;bottom:16px;width:72px;height:28px;background:#ff471e;border-radius:4px 6px 3px 3px;transform:skewX(-10deg);box-shadow:0 4px 0 #b83418}
.truck-cab{position:absolute;left:90px;bottom:16px;width:30px;height:30px;background:#ff8a3d;border-radius:5px 7px 2px 2px;box-shadow:0 4px 0 #b65d23}
.truck-cab:before{content:"";position:absolute;left:5px;top:6px;width:14px;height:10px;background:#1f2937;border-radius:2px}
.wheel{position:absolute;bottom:4px;width:19px;height:19px;border-radius:50%;background:#111827;border:4px solid #495164;animation:wheel .7s linear infinite}.w1{left:34px}.w2{left:93px}
@keyframes wheel{to{transform:rotate(360deg)}}
@keyframes truckMove{0%{left:-180px}100%{left:110%}}
.excavator{position:absolute;left:13%;bottom:19%;width:160px;height:82px;animation:excShake 1.8s ease-in-out infinite alternate}
.exc-base{position:absolute;bottom:0;left:22px;width:92px;height:18px;background:#192233;border-radius:15px}.exc-body{position:absolute;bottom:17px;left:38px;width:70px;height:37px;background:#f59e0b;border-radius:8px 12px 4px 4px}.exc-body:before{content:"";position:absolute;right:8px;top:7px;width:20px;height:13px;background:#111827;border-radius:3px}.arm1{position:absolute;left:91px;bottom:49px;width:75px;height:9px;background:#f59e0b;border-radius:8px;transform:rotate(-28deg);transform-origin:left center;animation:arm1 2.6s ease-in-out infinite}.arm2{position:absolute;left:151px;bottom:79px;width:58px;height:8px;background:#f59e0b;border-radius:8px;transform:rotate(45deg);transform-origin:left center;animation:arm2 2.6s ease-in-out infinite}.bucket{position:absolute;left:195px;bottom:39px;width:28px;height:20px;background:#b45309;border-radius:3px 3px 12px 12px;transform:rotate(18deg);animation:bucket 2.6s ease-in-out infinite}
@keyframes excShake{from{transform:translateY(0)}to{transform:translateY(-2px)}}
@keyframes arm1{0%,100%{transform:rotate(-30deg)}50%{transform:rotate(-13deg)}}
@keyframes arm2{0%,100%{transform:rotate(46deg)}50%{transform:rotate(22deg)}}
@keyframes bucket{0%,100%{transform:rotate(20deg) translateY(0)}50%{transform:rotate(-10deg) translateY(-13px)}}
.spark{position:absolute;width:4px;height:4px;background:#ffdd75;border-radius:50%;left:61%;bottom:35%;box-shadow:0 0 10px #ffdd75;animation:sparks 1.1s linear infinite}.spark.s2{animation-delay:.25s}.spark.s3{animation-delay:.55s}
@keyframes sparks{0%{opacity:0;transform:translate(0,0)}20%{opacity:1}100%{opacity:0;transform:translate(-40px,-35px)}}

.card{position:relative;z-index:3;width:min(94vw,520px);background:rgba(255,255,255,.96);border:1px solid rgba(255,255,255,.6);border-radius:20px;box-shadow:var(--shadow);padding:46px 48px 44px;backdrop-filter:blur(16px);animation:cardIn .55s ease-out}
@keyframes cardIn{from{opacity:0;transform:translateY(28px) scale(.98)}to{opacity:1;transform:translateY(0) scale(1)}}
.logo{width:82px;height:82px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;color:#fff;font-weight:900;font-size:30px;margin:0 auto 22px;box-shadow:0 18px 40px rgba(255,71,30,.35)}
h1{text-align:center;font-size:26px;margin-bottom:8px;letter-spacing:-.3px}.sub{text-align:center;color:var(--muted);font-size:15px;margin-bottom:34px}
.form-group{margin-bottom:18px}.label{display:block;font-size:12px;font-weight:800;letter-spacing:.8px;color:#687386;text-transform:uppercase;margin-bottom:9px}
.input-wrap{position:relative}.input{width:100%;height:52px;background:var(--input);border:1.5px solid var(--border);border-radius:12px;padding:0 15px;font-size:15px;color:var(--text);outline:none;transition:.18s}.input:focus{border-color:var(--accent);box-shadow:0 0 0 4px rgba(255,71,30,.13);background:#fff}.show-pass{position:absolute;right:8px;top:8px;height:36px;border:0;background:#eef2f8;border-radius:9px;padding:0 12px;font-weight:800;color:#455167;cursor:pointer}.show-pass:hover{color:var(--accent)}
.login-btn{width:100%;height:52px;border:0;border-radius:12px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:white;font-size:16px;font-weight:900;cursor:pointer;margin-top:8px;box-shadow:0 18px 30px rgba(255,71,30,.24);transition:.15s}.login-btn:hover{transform:translateY(-1px)}.login-btn:disabled{opacity:.72;cursor:not-allowed;transform:none}.login-btn.loading:before{content:"";display:inline-block;width:16px;height:16px;border-radius:50%;border:2px solid rgba(255,255,255,.55);border-top-color:#fff;vertical-align:-3px;margin-right:8px;animation:spin .75s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}
.msg{min-height:22px;margin-top:16px;text-align:center;font-size:13px;font-weight:700}.msg.error{color:var(--danger)}.msg.ok{color:var(--green)}
.footer-note{text-align:center;color:#7a8496;font-size:12px;margin-top:24px;line-height:1.5}.footer-note code{background:#eef2f8;border-radius:5px;padding:2px 5px}
@media(max-width:560px){.card{padding:34px 24px;border-radius:18px}.logo{width:70px;height:70px;font-size:25px}h1{font-size:22px}.sub{font-size:14px}.moon{display:none}}
</style>
</head>
<body>
<div class="mine-scene" aria-hidden="true">
  <div class="moon"></div><div class="mountains"></div><div class="mountains two"></div><div class="conveyor"></div><div class="crusher"></div><div class="dust"></div>
  <div class="spark"></div><div class="spark s2"></div><div class="spark s3"></div>
  <div class="excavator"><div class="exc-base"></div><div class="exc-body"></div><div class="arm1"></div><div class="arm2"></div><div class="bucket"></div></div>
  <div class="road"></div>
  <div class="truck"><div class="truck-body"></div><div class="truck-cab"></div><div class="wheel w1"></div><div class="wheel w2"></div></div>
  <div class="truck t2"><div class="truck-body"></div><div class="truck-cab"></div><div class="wheel w1"></div><div class="wheel w2"></div></div>
</div>

<form class="card" id="loginForm" autocomplete="on">
  <div class="logo">AIT</div>
  <h1>AIT Projects Dashboard</h1>
  <p class="sub">Sign in to access your dashboard</p>

  <div class="form-group">
    <label class="label" for="identifier">Email address or username</label>
    <input class="input" id="identifier" name="identifier" placeholder="your@email.com or username" autocomplete="username" required>
  </div>

  <div class="form-group">
    <label class="label" for="password">Password</label>
    <div class="input-wrap">
      <input class="input" id="password" name="password" type="password" placeholder="Enter password" autocomplete="current-password" required style="padding-right:84px">
      <button class="show-pass" type="button" onclick="togglePassword()" id="showBtn">Show</button>
    </div>
  </div>

  <button class="login-btn" id="loginBtn" type="submit">Sign In</button>
  <div class="msg" id="msg"></div>
  <div class="footer-note">Permissions are controlled from the <code>auth_users</code> sheet.</div>
</form>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbxFJroZzKQT1N0c70ktzFISQkWIkT7w_pyi7eAFxuDPx88icN-WvT2IGkrJ8W-Lt1uz/exec';

function apiCall(params){
  return new Promise((resolve,reject)=>{
    const cb='ait_auth_'+Date.now()+'_'+Math.random().toString(36).slice(2);
    const s=document.createElement('script');
    let done=false;
    const cleanup=()=>{done=true;delete window[cb];if(s.parentNode)s.parentNode.removeChild(s);};
    window[cb]=data=>{cleanup();resolve(data);};
    s.onerror=()=>{if(!done){cleanup();reject(new Error('Connection failed'));}};
    setTimeout(()=>{if(!done){cleanup();reject(new Error('Timeout. Try again.'));}},25000);
    const q=new URLSearchParams({...params,callback:cb,t:Date.now()});
    s.src=API_URL+'?'+q.toString();
    document.body.appendChild(s);
  });
}

function togglePassword(){
  const p=document.getElementById('password');
  const b=document.getElementById('showBtn');
  const show=p.type==='password';
  p.type=show?'text':'password';
  b.textContent=show?'Hide':'Show';
}

function setMsg(text,type){
  const m=document.getElementById('msg');
  m.textContent=text||'';
  m.className='msg '+(type||'');
}

function redirectAfterLogin(session){
  const first=(session.user.allowed_pages||[]).find(p=>p!=='auth')||'exec';
  location.href='Dashboard_Full.html#'+first;
}

document.getElementById('loginForm').addEventListener('submit',async e=>{
  e.preventDefault();
  const btn=document.getElementById('loginBtn');
  const identifier=document.getElementById('identifier').value.trim();
  const password=document.getElementById('password').value;
  if(!identifier||!password){setMsg('Please enter email/username and password.','error');return;}
  btn.disabled=true;btn.classList.add('loading');btn.textContent='Signing in...';setMsg('Checking permissions...','');
  try{
    const res=await apiCall({module:'auth',action:'login',identifier,password});
    if(!res||res.error||res.ok===false) throw new Error(res?.message||'Login failed');
    const session={token:res.token,user:res.user,loginAt:new Date().toISOString()};
    localStorage.setItem('ait_auth_session',JSON.stringify(session));
    setMsg('Login successful. Opening dashboard...','ok');
    setTimeout(()=>redirectAfterLogin(session),500);
  }catch(err){
    setMsg(err.message||String(err),'error');
    btn.disabled=false;btn.classList.remove('loading');btn.textContent='Sign In';
  }
});

(function init(){
  try{
    const s=JSON.parse(localStorage.getItem('ait_auth_session')||'null');
    if(s&&s.user&&s.token){ /* keep user on login page only if they want */ }
  }catch(e){}
})();
</script>
</body>
</html>
