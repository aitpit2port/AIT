<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AIT — Vendors</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
:root{
  --bg:#0b1118;--card:#111827;--card2:#1a2235;--border:#1e2d40;
  --text:#e8ecf2;--text2:#8892a4;--text3:#4b5a6e;
  --accent:#fd480e;--accent2:#ff6b35;--accentbg:rgba(253,72,14,.12);
  --green:#22c55e;--greenbg:rgba(34,197,94,.12);
  --red:#ef4444;--redbg:rgba(239,68,68,.12);
  --blue:#38bdf8;--bluebg:rgba(56,189,248,.12);
  --yellow:#f59e0b;--yellowbg:rgba(245,158,11,.12);
  --purple:#a78bfa;--purplebg:rgba(167,139,250,.12);
  --shadow:0 2px 12px rgba(0,0,0,.4);--radius:10px;
  --chart-grid:rgba(255,255,255,.04);--chart-txt:#8892a4;
}
[data-theme="light"]{
  --bg:#f0f2f5;--card:#fff;--card2:#f8f9fc;--border:#e1e5eb;
  --text:#1a2030;--text2:#5a6478;--text3:#8b949e;
  --shadow:0 1px 8px rgba(0,0,0,.08);
  --chart-grid:rgba(0,0,0,.06);--chart-txt:#5a6478;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100%;font-family:'Segoe UI',Arial,sans-serif;font-size:13px;background:var(--bg);color:var(--text);overflow-x:hidden;transition:.25s}
[dir="rtl"] body,[dir="rtl"] input,[dir="rtl"] select,[dir="rtl"] button{font-family:'Segoe UI',Tahoma,Arial,sans-serif}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
.topbar{background:var(--card);border-bottom:1px solid var(--border);padding:0 16px;height:52px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100;box-shadow:var(--shadow)}
.tb-title{font-size:15px;font-weight:800;line-height:1}.tb-sub{font-size:10px;color:var(--text2);margin-top:3px}.tb-spacer{flex:1}
.tb-info{font-size:11px;color:var(--text2);background:var(--card2);border:1px solid var(--border);border-radius:6px;padding:5px 10px;white-space:nowrap}
.tb-btn{display:flex;align-items:center;gap:5px;background:var(--card2);border:1px solid var(--border);border-radius:6px;padding:6px 11px;font-size:11px;font-weight:700;color:var(--text2);cursor:pointer;transition:.2s;white-space:nowrap;font-family:inherit}
.tb-btn:hover{border-color:var(--accent);color:var(--accent)}.tb-btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}.tb-btn.primary:hover{background:var(--accent2)}.tb-btn.primary:disabled{opacity:.6;cursor:not-allowed}.tb-btn.primary.spinning svg{animation:spin .8s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}
.filterbar{background:var(--card);border-bottom:1px solid var(--border);padding:8px 16px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.fl{font-size:10px;font-weight:800;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;white-space:nowrap}.fs,.search{background:var(--card2);border:1.5px solid var(--border);border-radius:6px;padding:6px 9px;font-size:11px;color:var(--text);cursor:pointer;outline:none;font-family:inherit}.fs{min-width:150px}.search{min-width:230px;cursor:text}.fs:focus,.search:focus{border-color:var(--accent)}
.btn-clear{background:none;border:1.5px solid var(--border);border-radius:6px;padding:6px 10px;font-size:11px;color:var(--text2);cursor:pointer;transition:.2s;margin-left:auto;font-family:inherit}.btn-clear:hover{border-color:var(--red);color:var(--red)}.active-badge{background:var(--accent);color:#fff;border-radius:4px;padding:2px 7px;font-size:10px;font-weight:800}
.content{padding:14px 16px 72px}.kpi-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:10px;margin-bottom:14px}@media(max-width:1280px){.kpi-grid{grid-template-columns:repeat(4,1fr)}}@media(max-width:700px){.kpi-grid{grid-template-columns:repeat(2,1fr)}}
.kc{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;border-top:3px solid transparent;transition:.2s}.kc:hover{transform:translateY(-2px);box-shadow:var(--shadow)}.kc.orange{border-top-color:var(--accent)}.kc.green{border-top-color:var(--green)}.kc.red{border-top-color:var(--red)}.kc.blue{border-top-color:var(--blue)}.kc.yellow{border-top-color:var(--yellow)}.kc.purple{border-top-color:var(--purple)}.kc-lbl{font-size:9px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;color:var(--text2);margin-bottom:6px}.kc-val{font-size:22px;font-weight:900;line-height:1}.kc-val.orange{color:var(--accent)}.kc-val.green{color:var(--green)}.kc-val.red{color:var(--red)}.kc-val.blue{color:var(--blue)}.kc-val.yellow{color:var(--yellow)}.kc-val.purple{color:var(--purple)}.kc-note{font-size:10px;color:var(--text2);margin-top:4px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:12px}.g1{margin-bottom:12px}@media(max-width:980px){.g3{grid-template-columns:1fr}}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}.card-head{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}.card-head h3{font-size:12px;font-weight:800}.card-head span{font-size:10px;color:var(--text2)}.card-body{padding:12px 14px}.ch{position:relative}.ch.h220{height:220px}
.tbl-wrap{overflow-x:auto;max-height:470px;overflow-y:auto}table{width:100%;border-collapse:collapse;font-size:11px}thead th{background:var(--card2);color:var(--accent);font-size:9px;font-weight:800;letter-spacing:.6px;text-transform:uppercase;padding:8px 12px;text-align:left;border-bottom:1px solid var(--border);white-space:nowrap;position:sticky;top:0;z-index:2}[dir="rtl"] thead th{text-align:right}tbody td{padding:8px 12px;border-bottom:1px solid var(--border);color:var(--text);vertical-align:middle}tbody tr:hover td{background:var(--card2)}.td-r{text-align:right}.td-b{font-weight:800}.td-s{font-size:10px;color:var(--text2)}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:800;white-space:nowrap}.badge.good{background:var(--greenbg);color:var(--green)}.badge.warn{background:var(--yellowbg);color:var(--yellow)}.badge.bad{background:var(--redbg);color:var(--red)}.badge.info{background:var(--bluebg);color:var(--blue)}
.page-load{position:fixed;inset:0;background:rgba(11,17,24,.92);display:flex;align-items:center;justify-content:center;z-index:9999;backdrop-filter:blur(4px)}.page-load.hidden{display:none}.ld-spin{width:48px;height:48px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 14px}.ld-msg{font-size:13px;color:var(--text2);text-align:center}.statusbar{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--border);padding:5px 16px;display:flex;align-items:center;gap:10px;font-size:10px;color:var(--text2);z-index:50}.s-dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 5px var(--green)}.s-dot.red{background:var(--red);box-shadow:0 0 5px var(--red)}.s-dot.yellow{background:var(--yellow);box-shadow:0 0 5px var(--yellow)}.empty{padding:26px;text-align:center;color:var(--text2);font-size:12px}.muted{color:var(--text3)}
</style>
</head>
<body>
<div class="page-load" id="pageLoad"><div><div class="ld-spin"></div><div class="ld-msg" id="ldMsg">Loading vendors...</div></div></div>
<div class="topbar">
  <div><div class="tb-title" data-i18n="pageTitle">Vendors</div><div class="tb-sub" data-i18n="pageSub">Supplier directory, categories and contact completeness</div></div>
  <div class="tb-spacer"></div>
  <div class="tb-info" id="lastUpdate">—</div>
  <select class="tb-btn" id="langSel" onchange="setLang(this.value)"><option value="en">🌐 EN</option><option value="ar">🌐 عربي</option><option value="zh">🌐 中文</option></select>
  <button class="tb-btn" id="themeBtn" onclick="toggleTheme()">🌙</button>
  <button class="tb-btn" onclick="exportExcel()">📄 <span data-i18n="exportExcel">Export Excel</span></button>
  <button class="tb-btn primary" id="btnRefresh" onclick="refreshData()"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M1 4v6h6M23 20v-6h-6"/><path d="M20.49 9A9 9 0 005.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 013.51 15"/></svg><span data-i18n="refresh">Refresh</span></button>
</div>
<div class="filterbar">
  <span class="fl" data-i18n="category">Category</span><select class="fs" id="fCategory" onchange="applyFilters()"><option value="all">All Categories</option></select>
  <span class="fl" data-i18n="source">Source</span><select class="fs" id="fSource" onchange="applyFilters()"><option value="all">All Sources</option></select>
  <span class="fl" data-i18n="contact">Contact</span><select class="fs" id="fContact" onchange="applyFilters()"><option value="all">All</option><option value="with_mobile">With Mobile</option><option value="missing_mobile">Missing Mobile</option><option value="with_bank">With Bank Data</option><option value="with_tax">With Tax / Register</option></select>
  <span class="fl" data-i18n="search">Search</span><input class="search" id="fSearch" oninput="applyFilters()" placeholder="Vendor / phone / category">
  <button class="btn-clear" onclick="clearFilters()">✕ <span data-i18n="clear">Clear</span></button><span class="active-badge" id="activeBadge" style="display:none"></span>
</div>
<div class="content">
  <div class="kpi-grid" id="kpiGrid"></div>
  <div class="g3">
    <div class="card"><div class="card-head"><h3 data-i18n="chartCategory">Vendors by Category</h3><span id="hCat"></span></div><div class="card-body"><div class="ch h220"><canvas id="cCategory"></canvas></div></div></div>
    <div class="card"><div class="card-head"><h3 data-i18n="chartContact">Contact Completeness</h3><span id="hContact"></span></div><div class="card-body"><div class="ch h220"><canvas id="cContact"></canvas></div></div></div>
    <div class="card"><div class="card-head"><h3 data-i18n="chartSource">Vendors by Source</h3><span id="hSource"></span></div><div class="card-body"><div class="ch h220"><canvas id="cSource"></canvas></div></div></div>
  </div>
  <div class="card g1">
    <div class="card-head"><h3 data-i18n="tableTitle">Vendor Directory</h3><span id="hTable"></span></div>
    <div class="tbl-wrap"><table><thead><tr id="tHead"></tr></thead><tbody id="tBody"></tbody></table></div>
  </div>
</div>
<div class="statusbar"><div class="s-dot" id="sDot"></div><span id="sText">Connecting...</span><span style="margin-left:auto" id="sCount"></span></div>
<script>
Chart.register(ChartDataLabels);
const API_URL='https://script.google.com/macros/s/AKfycbxFJroZzKQT1N0c70ktzFISQkWIkT7w_pyi7eAFxuDPx88icN-WvT2IGkrJ8W-Lt1uz/exec';
const MODULE='vendors';
const I18N={
  en:{pageTitle:'Vendors',pageSub:'Supplier directory, categories and contact completeness',exportExcel:'Export Excel',refresh:'Refresh',category:'Category',source:'Source',contact:'Contact',search:'Search',clear:'Clear',allCategories:'All Categories',allSources:'All Sources',all:'All',withMobile:'With Mobile',missingMobile:'Missing Mobile',withBank:'With Bank Data',withTax:'With Tax / Register',kTotal:'TOTAL VENDORS',kCategories:'CATEGORIES',kMobile:'WITH MOBILE',kMissingMobile:'MISSING MOBILE',kBank:'BANK DATA',kTax:'TAX / REGISTER',kSources:'SOURCE SHEETS',kLast:'LAST SYNC',records:'records',categories:'categories',vendors:'vendors',rows:'rows',chartCategory:'Vendors by Category',chartContact:'Contact Completeness',chartSource:'Vendors by Source',tableTitle:'Vendor Directory',vendor:'Vendor',mobile:'Mobile',bank:'Bank Name',account:'Account Number',tax:'Tax ID',register:'Commercial Register',representative:'Representative',sourceRow:'Source Row',noData:'No vendors match current filters',loading:'Loading vendors...',live:'Live data'},
  ar:{pageTitle:'الموردون',pageSub:'دليل الموردين والتصنيفات واكتمال بيانات التواصل',exportExcel:'تصدير Excel',refresh:'تحديث',category:'التصنيف',source:'المصدر',contact:'بيانات التواصل',search:'بحث',clear:'مسح',allCategories:'كل التصنيفات',allSources:'كل المصادر',all:'الكل',withMobile:'لديه هاتف',missingMobile:'هاتف ناقص',withBank:'بيانات بنكية',withTax:'ضريبي / سجل',kTotal:'إجمالي الموردين',kCategories:'التصنيفات',kMobile:'لديهم هاتف',kMissingMobile:'بدون هاتف',kBank:'بيانات بنكية',kTax:'ضريبي / سجل',kSources:'شيتات المصدر',kLast:'آخر مزامنة',records:'سجل',categories:'تصنيف',vendors:'مورد',rows:'صف',chartCategory:'الموردون حسب التصنيف',chartContact:'اكتمال بيانات التواصل',chartSource:'الموردون حسب المصدر',tableTitle:'دليل الموردين',vendor:'المورد',mobile:'الهاتف',bank:'البنك',account:'رقم الحساب',tax:'الرقم الضريبي',register:'السجل التجاري',representative:'الممثل',sourceRow:'صف المصدر',noData:'لا توجد موردين مطابقة للفلاتر الحالية',loading:'جاري تحميل الموردين...',live:'بيانات مباشرة'},
  zh:{pageTitle:'供应商',pageSub:'供应商目录、分类与联系信息完整性',exportExcel:'导出Excel',refresh:'刷新',category:'分类',source:'来源',contact:'联系方式',search:'搜索',clear:'清除',allCategories:'全部分类',allSources:'全部来源',all:'全部',withMobile:'有手机',missingMobile:'缺少手机',withBank:'有银行资料',withTax:'有税号/登记',kTotal:'供应商总数',kCategories:'分类数',kMobile:'有手机',kMissingMobile:'缺少手机',kBank:'银行资料',kTax:'税号/登记',kSources:'来源表',kLast:'最后同步',records:'记录',categories:'分类',vendors:'供应商',rows:'行',chartCategory:'按分类的供应商',chartContact:'联系信息完整性',chartSource:'按来源的供应商',tableTitle:'供应商目录',vendor:'供应商',mobile:'手机',bank:'银行',account:'账号',tax:'税号',register:'商业登记',representative:'代表',sourceRow:'来源行',noData:'没有符合筛选条件的供应商',loading:'正在加载供应商...',live:'实时数据'}
};
let LANG=localStorage.getItem('ait_lang')||'en';let THEME=localStorage.getItem('ait_theme')||'dark';let RAW=null,ROWS=[],FILTERED=[],CHARTS={};
const PAL=['#fd480e','#22c55e','#38bdf8','#f59e0b','#a78bfa','#ec4899','#14b8a6','#f97316','#84cc16','#06b6d4','#8b5cf6','#10b981'];
function tr(k){return(I18N[LANG]&&I18N[LANG][k])||I18N.en[k]||k}
function applyI18n(){document.querySelectorAll('[data-i18n]').forEach(el=>el.textContent=tr(el.getAttribute('data-i18n')));document.documentElement.lang=LANG;document.documentElement.dir=LANG==='ar'?'rtl':'ltr';const c=document.getElementById('fContact');if(c){c.options[0].textContent=tr('all');c.options[1].textContent=tr('withMobile');c.options[2].textContent=tr('missingMobile');c.options[3].textContent=tr('withBank');c.options[4].textContent=tr('withTax')}const s=document.getElementById('fSearch');if(s)s.placeholder=LANG==='ar'?'المورد / الهاتف / التصنيف':'Vendor / phone / category'}
function setLang(l){LANG=l;localStorage.setItem('ait_lang',l);document.getElementById('langSel').value=l;applyI18n();populateFilters();render()}
function toggleTheme(){THEME=THEME==='dark'?'light':'dark';localStorage.setItem('ait_theme',THEME);document.documentElement.setAttribute('data-theme',THEME);document.getElementById('themeBtn').textContent=THEME==='dark'?'🌙':'☀️';if(FILTERED.length)renderCharts()}
function fmt(v){v=Number(v)||0;return v>=1e6?(v/1e6).toFixed(1)+'M':v>=1e3?(v/1e3).toFixed(1)+'K':String(v)}
function clean(v){return String(v==null?'':v).trim()}
function val(r,keys){for(const k of keys){if(r&&r[k]!=null&&clean(r[k])!=='')return r[k]}return''}
function vendorName(r){return clean(val(r,['vendor','اسم_المورد','Supplier','supplier','name','Vendor','Contractor_Name','Contractor Name','المورد']))}
function categoryName(r){return clean(val(r,['category','النشاط','Activity','activity','type','source_type','Category']))}
function mobileVal(r){return clean(val(r,['Mobile','mobile','رقم_الهاتف','رقم الهاتف','Phone','phone','Tel','telephone','الهاتف']))}
function bankVal(r){return clean(val(r,['Bank_Name','Bank Name','bank_name','البنك','Bank']))}
function accountVal(r){return clean(val(r,['Account_Number','Account Number','account_number','رقم_الحساب','رقم الحساب','IBAN','iban']))}
function taxVal(r){return clean(val(r,['Tax_ID','Tax ID','tax_id','Commercial_Register','Commercial Register','commercial_register','السجل_التجاري','الرقم_الضريبي']))}
function sourceVal(r){return clean(val(r,['source_sheet','source_file','source_type']))}
function normRows(rows){return rows.map((r,i)=>Object.assign({},r,{_vendor:vendorName(r)||('Vendor '+(i+1)),_category:categoryName(r)||'Uncategorized',_mobile:mobileVal(r),_bank:bankVal(r),_account:accountVal(r),_tax:taxVal(r),_source:sourceVal(r)||'supplier',_sourceRow:val(r,['source_row','Source Row','row'])||''}))}
function apiCall(action){return new Promise((resolve,reject)=>{const cb='ait_'+Date.now()+'_'+Math.random().toString(36).slice(2);const s=document.createElement('script');let done=false;const cleanup=()=>{done=true;delete window[cb];if(s.parentNode)s.parentNode.removeChild(s)};window[cb]=data=>{cleanup();resolve(data)};s.onerror=()=>{if(!done){cleanup();reject(new Error('Connection failed'))}};setTimeout(()=>{if(!done){cleanup();reject(new Error('Timeout'))}},30000);s.src=API_URL+'?module='+encodeURIComponent(MODULE)+'&action='+encodeURIComponent(action)+'&callback='+cb+'&t='+Date.now();document.body.appendChild(s)})}
function extractRows(res){if(!res)return[];if(res.vendors&&Array.isArray(res.vendors.rows))return res.vendors.rows;if(Array.isArray(res.rows))return res.rows;if(Array.isArray(res.data))return res.data;if(res.data&&Array.isArray(res.data.rows))return res.data.rows;return[]}
async function loadData(action='data'){setStatus('yellow',tr('loading'));document.getElementById('ldMsg').textContent=tr('loading');document.getElementById('pageLoad').classList.remove('hidden');try{const res=await apiCall(action);if(res.error)throw new Error(res.message||'API error');RAW=res;ROWS=normRows(extractRows(res));populateFilters();applyFilters();document.getElementById('lastUpdate').textContent='🕐 '+(res.lastUpdated||res.serverTime||new Date().toLocaleString());setStatus('ok',tr('live')+' — '+FILTERED.length+' '+tr('vendors'))}catch(e){console.error(e);setStatus('error','Error: '+e.message);ROWS=[];FILTERED=[];render()}finally{document.getElementById('pageLoad').classList.add('hidden')}}
async function refreshData(){const btn=document.getElementById('btnRefresh');btn.disabled=true;btn.classList.add('spinning');await loadData('sync');btn.disabled=false;btn.classList.remove('spinning')}
function populateFilters(){const fc=document.getElementById('fCategory'),fs=document.getElementById('fSource');const curC=fc.value||'all',curS=fs.value||'all';const cats=[...new Set(ROWS.map(r=>r._category).filter(Boolean))].sort();const srcs=[...new Set(ROWS.map(r=>r._source).filter(Boolean))].sort();fc.innerHTML='<option value="all">'+tr('allCategories')+'</option>'+cats.map(x=>'<option value="'+escapeHtml(x)+'">'+escapeHtml(x)+'</option>').join('');fs.innerHTML='<option value="all">'+tr('allSources')+'</option>'+srcs.map(x=>'<option value="'+escapeHtml(x)+'">'+escapeHtml(x)+'</option>').join('');fc.value=cats.includes(curC)?curC:'all';fs.value=srcs.includes(curS)?curS:'all'}
function applyFilters(){const cat=document.getElementById('fCategory').value,src=document.getElementById('fSource').value,contact=document.getElementById('fContact').value,q=clean(document.getElementById('fSearch').value).toLowerCase();FILTERED=ROWS.filter(r=>{if(cat!=='all'&&r._category!==cat)return false;if(src!=='all'&&r._source!==src)return false;if(contact==='with_mobile'&&!r._mobile)return false;if(contact==='missing_mobile'&&r._mobile)return false;if(contact==='with_bank'&&!(r._bank||r._account))return false;if(contact==='with_tax'&&!r._tax)return false;if(q){const hay=[r._vendor,r._category,r._mobile,r._bank,r._source,JSON.stringify(r)].join(' ').toLowerCase();if(!hay.includes(q))return false}return true});const ac=[cat,src,contact,q].filter(v=>v&&v!=='all').length;const badge=document.getElementById('activeBadge');badge.style.display=ac?'':'none';badge.textContent=ac+' active';render()}
function clearFilters(){document.getElementById('fCategory').value='all';document.getElementById('fSource').value='all';document.getElementById('fContact').value='all';document.getElementById('fSearch').value='';applyFilters()}
function render(){renderKPIs();renderCharts();renderTable();document.getElementById('sCount').textContent=FILTERED.length+' / '+ROWS.length+' '+tr('vendors')}
function countWhere(arr,fn){return arr.filter(fn).length}
function renderKPIs(){const cats=new Set(FILTERED.map(r=>r._category).filter(Boolean));const srcs=new Set(FILTERED.map(r=>r._source).filter(Boolean));const withMob=countWhere(FILTERED,r=>!!r._mobile);const missMob=FILTERED.length-withMob;const withBank=countWhere(FILTERED,r=>!!(r._bank||r._account));const withTax=countWhere(FILTERED,r=>!!r._tax);const kpis=[{l:tr('kTotal'),v:FILTERED.length,n:tr('records'),c:'orange'},{l:tr('kCategories'),v:cats.size,n:tr('categories'),c:'blue'},{l:tr('kMobile'),v:withMob,n:FILTERED.length?Math.round(withMob/FILTERED.length*100)+'%':'0%',c:'green'},{l:tr('kMissingMobile'),v:missMob,n:FILTERED.length?Math.round(missMob/FILTERED.length*100)+'%':'0%',c:missMob?'red':'green'},{l:tr('kBank'),v:withBank,n:FILTERED.length?Math.round(withBank/FILTERED.length*100)+'%':'0%',c:'purple'},{l:tr('kTax'),v:withTax,n:FILTERED.length?Math.round(withTax/FILTERED.length*100)+'%':'0%',c:'yellow'},{l:tr('kSources'),v:srcs.size,n:tr('rows'),c:'blue'},{l:tr('kLast'),v:(RAW&&(RAW.lastUpdated||RAW.serverTime))?String(RAW.lastUpdated||RAW.serverTime).slice(0,16):'—',n:'',c:'orange'}];document.getElementById('kpiGrid').innerHTML=kpis.map(k=>'<div class="kc '+k.c+'"><div class="kc-lbl">'+escapeHtml(k.l)+'</div><div class="kc-val '+k.c+'">'+escapeHtml(k.v)+'</div><div class="kc-note">'+escapeHtml(k.n)+'</div></div>').join('')}
function gc(){const cs=getComputedStyle(document.documentElement);return{grid:cs.getPropertyValue('--chart-grid').trim(),txt:cs.getPropertyValue('--chart-txt').trim()}}
function mkChart(id,type,labels,datasets,extra={}){if(CHARTS[id])CHARTS[id].destroy();const el=document.getElementById(id);if(!el)return;const {grid,txt}=gc();CHARTS[id]=new Chart(el,{type,data:{labels,datasets},options:{responsive:true,maintainAspectRatio:false,animation:{duration:280},plugins:{legend:{display:extra.legend??false,labels:{color:txt,boxWidth:10,font:{size:10}}},tooltip:{backgroundColor:'#07101f',borderColor:'#fd480e',borderWidth:1,titleColor:'#fd480e',bodyColor:'#e8ecf2',padding:10},datalabels:extra.datalabels??{display:ctx=>ctx.dataset.data[ctx.dataIndex]>0,color:'#fff',font:{weight:'bold',size:10},formatter:v=>v>0?v:''}},scales:(type==='doughnut'||type==='pie')?{}:{x:{grid:{color:grid},ticks:{color:txt,font:{size:10},maxRotation:35}},y:{grid:{color:grid},ticks:{color:txt,font:{size:10},callback:v=>fmt(v)}}}}})}
function groupCount(arr,keyFn){const g={};arr.forEach(r=>{const k=keyFn(r)||'Other';g[k]=(g[k]||0)+1});return g}
function topGroup(g,n=12){return Object.keys(g).sort((a,b)=>g[b]-g[a]).slice(0,n).map(k=>[k,g[k]])}
function renderCharts(){const cat=topGroup(groupCount(FILTERED,r=>r._category),12);document.getElementById('hCat').textContent=cat.length+' '+tr('categories');mkChart('cCategory','bar',cat.length?cat.map(x=>x[0]):['—'],[{label:tr('vendors'),data:cat.length?cat.map(x=>x[1]):[0],backgroundColor:'rgba(253,72,14,.8)',borderRadius:5}],{legend:false});const withMob=countWhere(FILTERED,r=>!!r._mobile),miss=FILTERED.length-withMob,withBank=countWhere(FILTERED,r=>!!(r._bank||r._account)),withTax=countWhere(FILTERED,r=>!!r._tax);document.getElementById('hContact').textContent=FILTERED.length+' '+tr('vendors');mkChart('cContact','doughnut',[tr('withMobile'),tr('missingMobile'),tr('withBank'),tr('withTax')],[{data:[withMob,miss,withBank,withTax],backgroundColor:['rgba(34,197,94,.85)','rgba(239,68,68,.85)','rgba(167,139,250,.85)','rgba(245,158,11,.85)'],borderWidth:1}],{legend:true,datalabels:{display:true,color:'#fff',font:{weight:'bold',size:10},formatter:v=>v>0?v:''}});const src=topGroup(groupCount(FILTERED,r=>r._source),8);document.getElementById('hSource').textContent=src.length+' '+tr('rows');mkChart('cSource','bar',src.length?src.map(x=>x[0]):['—'],[{label:tr('vendors'),data:src.length?src.map(x=>x[1]):[0],backgroundColor:'rgba(56,189,248,.8)',borderRadius:5}],{legend:false})}
function renderTable(){const h=['category','vendor','mobile','bank','account','tax','representative','sourceRow'];document.getElementById('tHead').innerHTML='<th>'+tr('category')+'</th><th>'+tr('vendor')+'</th><th>'+tr('mobile')+'</th><th>'+tr('bank')+'</th><th>'+tr('account')+'</th><th>'+tr('tax')+'</th><th>'+tr('representative')+'</th><th>'+tr('sourceRow')+'</th>';document.getElementById('hTable').textContent=FILTERED.length+' '+tr('rows');const body=document.getElementById('tBody');if(!FILTERED.length){body.innerHTML='<tr><td colspan="8" class="empty">'+tr('noData')+'</td></tr>';return}body.innerHTML=FILTERED.slice(0,500).map(r=>{const rep=clean(val(r,['Representative','representative','الممثل','Position','position']));return '<tr><td><span class="badge info">'+escapeHtml(r._category||'—')+'</span></td><td class="td-b">'+escapeHtml(r._vendor||'—')+'</td><td>'+escapeHtml(r._mobile||'—')+'</td><td>'+escapeHtml(r._bank||'—')+'</td><td>'+escapeHtml(r._account||'—')+'</td><td>'+escapeHtml(r._tax||'—')+'</td><td>'+escapeHtml(rep||'—')+'</td><td class="td-r">'+escapeHtml(r._sourceRow||'—')+'</td></tr>'}).join('')}
function exportExcel(){if(!FILTERED.length){alert(tr('noData'));return}const data=FILTERED.map(r=>({Category:r._category,Vendor:r._vendor,Mobile:r._mobile,Bank:r._bank,Account:r._account,TaxOrRegister:r._tax,Source:r._source,SourceRow:r._sourceRow}));const wb=XLSX.utils.book_new();const ws=XLSX.utils.json_to_sheet(data);ws['!cols']=[{wch:24},{wch:36},{wch:16},{wch:22},{wch:18},{wch:22},{wch:16},{wch:10}];XLSX.utils.book_append_sheet(wb,ws,'Vendors');XLSX.writeFile(wb,'AIT_Vendors_'+new Date().toISOString().slice(0,10)+'.xlsx')}
function setStatus(type,msg){const dot=document.getElementById('sDot');dot.className='s-dot'+(type==='error'?' red':type==='yellow'?' yellow':'');document.getElementById('sText').textContent=msg}
function escapeHtml(s){return String(s==null?'':s).replace(/[&<>\"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]))}
window.addEventListener('DOMContentLoaded',()=>{document.documentElement.setAttribute('data-theme',THEME);document.getElementById('themeBtn').textContent=THEME==='dark'?'🌙':'☀️';document.getElementById('langSel').value=LANG;applyI18n();loadData('data')});
</script>
</body>
</html>
