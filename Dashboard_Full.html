<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"> 
<title>AIT Pit2Port Dashboard</title>
<style>
:root{--bg:#0b1118;--panel:#111827;--panel2:#151f30;--panel3:#1a2538;--border:#243244;--text:#e8ecf2;--muted:#8892a4;--muted2:#566477;--accent:#fd480e;--accent2:#ff6b35;--green:#22c55e;--red:#ef4444;--shadow:0 12px 36px rgba(0,0,0,.38);--sidebar:278px;--topbar:58px}
[data-theme="light"]{--bg:#eef2f7;--panel:#fff;--panel2:#f7f9fc;--panel3:#edf2f8;--border:#dbe3ee;--text:#172033;--muted:#5e6a7d;--muted2:#8b96a6;--shadow:0 10px 28px rgba(15,23,42,.10)}
*{box-sizing:border-box;margin:0;padding:0}html,body{height:100%;font-family:'Segoe UI',Arial,sans-serif;background:var(--bg);color:var(--text);overflow:hidden}button,a,input{font-family:inherit}.app{height:100vh;display:grid;grid-template-columns:var(--sidebar) 1fr}.sidebar{background:linear-gradient(180deg,var(--panel),#0d1521);border-right:1px solid var(--border);display:flex;flex-direction:column;box-shadow:var(--shadow);z-index:5}.brand{height:74px;padding:16px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px}.logo{width:40px;height:40px;border-radius:12px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;color:#fff;font-weight:900;box-shadow:0 8px 18px rgba(253,72,14,.22)}.brand-title{font-size:15px;font-weight:800}.brand-sub{font-size:10px;color:var(--muted);margin-top:3px}.nav-tools{padding:12px 14px;border-bottom:1px solid var(--border)}.search{width:100%;background:var(--panel2);border:1px solid var(--border);border-radius:10px;color:var(--text);outline:none;padding:10px 12px;font-size:12px}.search:focus{border-color:var(--accent)}.nav{padding:10px 10px 18px;overflow:auto;flex:1}.group-label{font-size:10px;font-weight:800;color:var(--muted2);letter-spacing:.7px;text-transform:uppercase;margin:12px 10px 7px}.nav-link{width:100%;display:flex;align-items:center;gap:10px;text-decoration:none;color:var(--muted);padding:10px;border-radius:10px;margin:2px 0;font-size:13px;font-weight:650;transition:.16s;border:1px solid transparent}.nav-link:hover{background:var(--panel2);color:var(--text);border-color:var(--border)}.nav-link.active{background:rgba(253,72,14,.13);color:var(--accent);border-color:rgba(253,72,14,.35)}.nav-code{width:30px;height:24px;border-radius:7px;background:var(--panel3);border:1px solid var(--border);display:inline-flex;align-items:center;justify-content:center;font-size:10px;font-weight:900;color:var(--muted);flex-shrink:0}.nav-link.active .nav-code{background:var(--accent);border-color:var(--accent);color:#fff}.main{min-width:0;display:grid;grid-template-rows:var(--topbar) 1fr;height:100vh}.topbar{height:var(--topbar);display:flex;align-items:center;gap:10px;background:rgba(17,24,39,.92);border-bottom:1px solid var(--border);padding:0 16px;backdrop-filter:blur(10px);z-index:4}[data-theme="light"] .topbar{background:rgba(255,255,255,.92)}.menu-btn{display:none;background:var(--panel2);border:1px solid var(--border);color:var(--text);border-radius:10px;width:38px;height:36px;font-size:20px;cursor:pointer}.crumb{min-width:0;flex:1}.page-title{font-size:15px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.page-sub{font-size:10px;color:var(--muted);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.tb-btn{background:var(--panel2);border:1px solid var(--border);color:var(--muted);border-radius:9px;padding:8px 11px;font-size:12px;font-weight:700;cursor:pointer;text-decoration:none;white-space:nowrap;transition:.16s}.tb-btn:hover{border-color:var(--accent);color:var(--accent)}.tb-btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}.tb-btn.primary:hover{background:var(--accent2);color:#fff}.user-chip{background:var(--panel2);border:1px solid var(--border);border-radius:12px;padding:6px 10px;font-size:11px;color:var(--muted);max-width:190px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.frame-wrap{position:relative;background:var(--bg);overflow:hidden;min-height:0}iframe{width:100%;height:100%;border:0;background:var(--bg);display:block;min-height:0}.loader{position:absolute;inset:0;background:linear-gradient(180deg,rgba(11,17,24,.94),rgba(11,17,24,.86));display:flex;align-items:center;justify-content:center;z-index:3;transition:.25s}[data-theme="light"] .loader{background:rgba(238,242,247,.86)}.loader.hidden{opacity:0;pointer-events:none}.spin{width:44px;height:44px;border-radius:50%;border:3px solid var(--border);border-top-color:var(--accent);animation:spin .8s linear infinite;margin:0 auto 14px}@keyframes spin{to{transform:rotate(360deg)}}.load-text{text-align:center;color:var(--muted);font-size:13px;font-weight:700}.mobile-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:8}.mobile-overlay.show{display:block}.sidebar-footer{padding:12px 14px;border-top:1px solid var(--border);font-size:10px;color:var(--muted2);line-height:1.5}.status-dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green);margin-right:6px}.no-access{position:absolute;inset:0;display:none;align-items:center;justify-content:center;background:var(--bg);z-index:4}.no-access.show{display:flex}.no-card{background:var(--panel);border:1px solid var(--border);border-radius:16px;padding:28px;text-align:center;box-shadow:var(--shadow);max-width:420px}.no-card h2{font-size:22px;margin-bottom:8px}.no-card p{color:var(--muted);font-size:13px;line-height:1.7}@media(max-width:920px){.app{grid-template-columns:1fr}.sidebar{position:fixed;left:0;top:0;bottom:0;width:min(86vw,310px);transform:translateX(-105%);transition:.22s;z-index:9}.sidebar.open{transform:translateX(0)}.menu-btn{display:block}.tb-btn.hide-sm,.user-chip{display:none}.topbar{height:auto;min-height:var(--topbar);flex-wrap:wrap}.crumb{min-width:180px}.main{height:100dvh}.app{height:100dvh}}@media(max-width:560px){:root{--topbar:64px}.topbar{gap:8px;padding:8px 12px}.page-title{font-size:14px}.page-sub{max-width:100%;font-size:10px}.tb-btn{font-size:11px;padding:7px 9px}.sidebar{width:min(88vw,320px)}}
.logo{border-radius:50%!important;overflow:hidden}.logo img{width:100%;height:100%;display:block}.top-logo{display:none;width:36px;height:36px;border-radius:50%;flex-shrink:0}.app,.main{height:var(--ait-vh,100dvh)!important}.sidebar{padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom)}.nav{-webkit-overflow-scrolling:touch}.nav-link{min-height:44px}.menu-btn{width:42px;height:42px}.tb-btn{min-height:40px}
@media(max-width:920px){.top-logo{display:block}.topbar{padding-top:env(safe-area-inset-top);min-height:calc(var(--topbar) + env(safe-area-inset-top))}.crumb{min-width:0}.mobile-overlay{background:rgba(0,0,0,.55);backdrop-filter:blur(3px)}}
@media(max-width:560px){.topbar{flex-wrap:nowrap;padding:calc(8px + env(safe-area-inset-top)) 10px 8px;overflow:hidden}.topbar #themeBtn{display:none}.tb-btn{font-size:0;min-width:42px}.tb-btn.primary:before{content:'↪';font-size:17px}}
</style>
<script src="dashboard-common.js"></script>
<link rel="stylesheet" href="ait-dashboard-theme.css">
</head>
<body>
<div class="mobile-overlay" id="overlay" onclick="toggleMenu(false)"></div>
<div class="app">
  <aside class="sidebar" id="sidebar">
    <div class="brand"><div class="logo"><img src="ait-logo.svg" alt="AIT"></div><div><div class="brand-title">Pit2Port Dashboard</div><div class="brand-sub">Unified operations control center</div></div></div>
    <div class="nav-tools"><input class="search" id="navSearch" placeholder="Search pages..." oninput="filterNav(this.value)"></div>
    <nav class="nav" id="nav"></nav>
    <div class="sidebar-footer"><span class="status-dot"></span><span id="permText">Permissions loaded</span><br><span id="clock">—</span></div>
  </aside>
  <main class="main">
    <header class="topbar">
      <button class="menu-btn" onclick="toggleMenu(true)" aria-label="Open navigation" aria-controls="sidebar" aria-expanded="false">≡</button>
      <img class="top-logo" src="ait-logo.svg" alt="AIT">
      <div class="crumb"><div class="page-title" id="pageTitle">Dashboard</div><div class="page-sub" id="pageSub">Loading page...</div></div>
      <div class="user-chip" id="userChip">—</div>
      <button class="tb-btn hide-sm" onclick="reloadPage()">Refresh Page</button>
      <a class="tb-btn hide-sm" id="openNew" href="exec.html" target="_blank">Open</a>
      <button class="tb-btn" onclick="toggleTheme()" id="themeBtn">Dark</button>
      <button class="tb-btn primary" onclick="logout()">Logout</button>
    </header>
    <section class="frame-wrap">
      <div class="loader" id="loader"><div><div class="spin"></div><div class="load-text">Loading dashboard page...</div></div></div>
      <div class="no-access" id="noAccess"><div class="no-card"><h2>No access</h2><p>Your account is not allowed to open this page. Ask the administrator to update your page permissions in <b>auth_users</b>.</p></div></div>
      <iframe id="pageFrame" title="AIT Dashboard Page"></iframe>
    </section>
  </main>
</div>

<script>
const PAGES={
  exec:{file:'exec.html',title:'Executive Summary',sub:'Overall status, KPIs and management view',group:'Overview',code:'EX'},
  performance:{file:'performance.html',title:'Performance',sub:'Operational KPIs and performance trends',group:'Overview',code:'PF'},
  samples:{file:'samples.html',title:'Quality / Samples',sub:'XRF analysis, sample category and element levels',group:'Operations',code:'QL'},
  production:{file:'production.html',title:'Production / Lots & Equipment',sub:'Mine to crusher to port production flow with equipment hours and productivity',group:'Operations',code:'PR'},
  equipment:{file:'equipment.html',title:'Equipment',sub:'Daily equipment hours, production, zones and productivity',group:'Operations',code:'EQ'},
  mines:{file:'mines.html',title:'Mines Map',sub:'Mine shipments and mine-level tracking',group:'Operations',code:'MN'},
  goldmap:{file:'egypt_mines_map.html',title:'Gold Blocks Map',sub:'Secure geological blocks and gold areas map',group:'Operations',code:'GM'},
  timeline:{file:'timeline.html',title:'Timeline',sub:'Project progress and schedule tracking',group:'Operations',code:'TL'},
  budget:{file:'budget.html',title:'Budget Overview',sub:'Budget model, CAPEX, OPEX and plan values',group:'Finance',code:'BG'},
  expenses:{file:'expenses.html',title:'Expenses',sub:'Actual expenses and payment tracking',group:'Finance',code:'EP'},
  cost:{file:'cost.html',title:'Cost Analysis',sub:'Cost structure and operating analysis',group:'Finance',code:'CT'},
  cashflow:{file:'cashflow.html',title:'Cash Flow',sub:'Cash movement, transfers and payments',group:'Finance',code:'CF'},
  vendors:{file:'vendors.html',title:'Vendors',sub:'Supplier directory, contacts and banking data',group:'Administration',code:'VD'},
  approvals:{file:'approvals.html',title:'Approvals',sub:'Approvals, payments and document flow',group:'Administration',code:'AP'},
  spareparts:{file:'spareparts.html',title:'Spare Parts',sub:'Warehouse and spare parts tracking',group:'Administration',code:'SP'},
  risks:{file:'risks.html',title:'Risks & Alerts',sub:'Risk log, alerts and exceptions',group:'Administration',code:'RK'},
  auth:{file:'auth.html',title:'Login / Permissions',sub:'Access and permissions page',group:'Administration',code:'AU'}
};
const DEFAULT_API_URL='https://script.google.com/macros/s/AKfycbxfl8DMsgy__jtquMmQX0-RByrW2qIL45nzH8imv-slUdUkJm8XwTJjsz6gphtua-LJiw/exec';
const __apiQs=new URLSearchParams(location.search);
const API_URL=__apiQs.get('api')||localStorage.getItem('ait_api_url')||DEFAULT_API_URL;
if(__apiQs.get('api')) localStorage.setItem('ait_api_url',__apiQs.get('api'));
let SESSION=null;
let ALLOWED=[];
const frame=document.getElementById('pageFrame'),loader=document.getElementById('loader'),titleEl=document.getElementById('pageTitle'),subEl=document.getElementById('pageSub'),openNew=document.getElementById('openNew'),noAccess=document.getElementById('noAccess');
function readSession(){try{return window.AITSession?AITSession.get():JSON.parse(localStorage.getItem('ait_auth_session')||'null')}catch(e){return null}}
function jsonp(params){return new Promise((resolve,reject)=>{const cb='ait_shell_'+Date.now()+'_'+Math.random().toString(36).slice(2);const s=document.createElement('script');let done=false;const cleanup=()=>{done=true;delete window[cb];if(s.parentNode)s.parentNode.removeChild(s)};window[cb]=data=>{cleanup();resolve(data)};s.onerror=()=>{if(!done){cleanup();reject(new Error('Connection failed'))}};setTimeout(()=>{if(!done){cleanup();reject(new Error('Timeout'))}},25000);const q=new URLSearchParams({...params,callback:cb,t:Date.now()});s.src=API_URL+'?'+q.toString();document.body.appendChild(s)})}
function truthyPerm(v){
  if(v===true || v===1) return true;
  const s=String(v||'').trim().toLowerCase();
  return ['true','1','yes','y','ok','✓','checked'].includes(s);
}
function isAllowed(page){
  const u=SESSION&&SESSION.user?SESSION.user:{};
  const pages=u.pages||{};
  const allowed=Array.isArray(u.allowed_pages)?u.allowed_pages:[];
  if(page==='goldmap'){
    return !!(
      truthyPerm(pages.mines) ||
      allowed.includes('mines') ||
      truthyPerm(pages.goldmap) ||
      truthyPerm(pages.page_goldmap) ||
      truthyPerm(u.goldmap) ||
      truthyPerm(u.page_goldmap) ||
      allowed.includes('goldmap') ||
      allowed.includes('page_goldmap')
    );
  }
  return !!(pages&&(pages[page]||(page==='equipment'&&pages.production)));
}
async function requireAuth(){SESSION=readSession();if(!SESSION||!SESSION.user||!SESSION.token){location.href='auth.html';return false;}const age=SESSION.loginAt?(Date.now()-new Date(SESSION.loginAt).getTime()):999999999;const freshLogin=age>=0&&age<120000;try{if(!freshLogin){const verified=await jsonp({module:'auth',action:'verify',token:SESSION.token});if(!verified||verified.ok===false||!verified.user)throw new Error(verified&&verified.message||'Session expired');SESSION={token:SESSION.token,user:verified.user,loginAt:SESSION.loginAt||new Date().toISOString()};window.AITSession?AITSession.set(SESSION):localStorage.setItem('ait_auth_session',JSON.stringify(SESSION));}}catch(e){window.AITSession?AITSession.clear():localStorage.removeItem('ait_auth_session');location.href='auth.html?reason=expired';return false;}ALLOWED=Object.keys(PAGES).filter(p=>p!=='auth'&&isAllowed(p));if(!ALLOWED.length){window.AITSession?AITSession.clear():localStorage.removeItem('ait_auth_session');location.href='auth.html?reason=no_access';return false;}document.getElementById('userChip').textContent=(SESSION.user.username||SESSION.user.email||'User')+' · '+(SESSION.user.job||'');document.getElementById('permText').textContent=SESSION.user.view_only?'View only':'Interactive access';return true;}
function renderNav(){const nav=document.getElementById('nav');const groups={};ALLOWED.forEach(k=>{if(!PAGES[k])return;const g=PAGES[k].group||'Other';groups[g]=groups[g]||[];groups[g].push(k)});nav.innerHTML=Object.keys(groups).map(g=>'<div class="group-label">'+g+'</div>'+groups[g].map(k=>'<a class="nav-link" href="#'+k+'" data-page="'+k+'"><span class="nav-code">'+PAGES[k].code+'</span><span>'+PAGES[k].title+'</span></a>').join('')).join('');}
function getPageFromHash(){const h=(location.hash||'').replace('#','').trim().toLowerCase();if(PAGES[h]&&isAllowed(h))return h;return ALLOWED.find(p=>p!=='auth')||ALLOWED[0];}
function loadPage(pageKey){if(!isAllowed(pageKey)){showNoAccess(pageKey);return;}noAccess.classList.remove('show');const p=PAGES[pageKey];document.querySelectorAll('.nav-link').forEach(a=>a.classList.toggle('active',a.dataset.page===pageKey));titleEl.textContent=p.title;subEl.textContent=p.sub;const pageUrl=p.file+'?token='+encodeURIComponent(SESSION.token)+'&api='+encodeURIComponent(API_URL)+'&v='+Date.now();openNew.href=pageUrl;loader.classList.remove('hidden');frame.src=pageUrl;localStorage.setItem('ait_shell_page',pageKey);toggleMenu(false)}
function showNoAccess(pageKey){loader.classList.add('hidden');noAccess.classList.add('show');titleEl.textContent='No access';subEl.textContent='Page not allowed: '+pageKey;}
frame.addEventListener('load',()=>{setTimeout(()=>{loader.classList.add('hidden');enforcePermissions();syncEmbeddedFrame();},240)});
function syncEmbeddedFrame(){
  try{
    const key=getPageFromHash();
    if(key==='goldmap' && frame && frame.contentWindow){
      const theme=document.documentElement.getAttribute('data-theme')||'dark';
      frame.contentWindow.postMessage({cmd:'setEmbedded',value:true},'*');
      frame.contentWindow.postMessage({cmd:'setTheme',value:theme},'*');
      frame.contentWindow.postMessage({cmd:'setLang',value:'en'},'*');
    }
  }catch(e){}
}
window.addEventListener('hashchange',()=>loadPage(getPageFromHash()));
function enforcePermissions(){try{const doc=frame.contentDocument||frame.contentWindow.document;if(!doc||!SESSION||!SESSION.user)return;if(getPageFromHash()==='goldmap')return;const u=SESSION.user;const disableFilters=!!u.view_only||!u.can_filter;const disableExport=!!u.view_only||!u.can_export;if(disableFilters){doc.querySelectorAll('select,input[type="date"],input[type="search"],.filterbar input,.filterbar select').forEach(el=>{el.disabled=true;el.title='Filters disabled by permission';});doc.querySelectorAll('button').forEach(btn=>{const t=(btn.textContent||'').toLowerCase();if(t.includes('clear')||t.includes('filter')||t.includes('refresh')){btn.disabled=true;btn.style.opacity=.45;btn.title='Disabled by permission';}});}if(disableExport){doc.querySelectorAll('button,a').forEach(el=>{const t=(el.textContent||'').toLowerCase();if(t.includes('export')||t.includes('excel')||t.includes('download')){el.style.display='none';}});}if(u.view_only){doc.querySelectorAll('input,textarea,button').forEach(el=>{const t=(el.textContent||'').toLowerCase();if(!t.includes('en')&&!t.includes('عربي')&&!t.includes('中文'))el.disabled=true;});}}catch(e){console.warn('Permission enforcement skipped:',e)}}
function reloadPage(){loadPage(getPageFromHash())}
async function logout(){try{const cb='ait_logout_'+Date.now();const s=document.createElement('script');window[cb]=()=>{delete window[cb];if(s.parentNode)s.parentNode.removeChild(s)};s.src=API_URL+'?module=auth&action=logout&token='+encodeURIComponent(SESSION&&SESSION.token||'')+'&callback='+cb+'&t='+Date.now();document.body.appendChild(s)}catch(e){}window.AITSession?AITSession.clear():localStorage.removeItem('ait_auth_session');location.href='auth.html'}
function toggleTheme(){const root=document.documentElement;const next=root.getAttribute('data-theme')==='dark'?'light':'dark';root.setAttribute('data-theme',next);localStorage.setItem('ait_shell_theme',next);document.getElementById('themeBtn').textContent=next==='dark'?'Dark':'Light'}
function toggleMenu(show){document.getElementById('sidebar').classList.toggle('open',!!show);document.getElementById('overlay').classList.toggle('show',!!show);const b=document.querySelector('.menu-btn');if(b)b.setAttribute('aria-expanded',String(!!show))}
function filterNav(q){q=String(q||'').toLowerCase().trim();document.querySelectorAll('.nav-link').forEach(a=>{a.style.display=a.textContent.toLowerCase().includes(q)?'':'none'});}
function tick(){document.getElementById('clock').textContent=new Date().toLocaleString('en-GB')}setInterval(tick,1000);tick();
(async function init(){if(!await requireAuth())return;renderNav();const theme=localStorage.getItem('ait_shell_theme')||'dark';document.documentElement.setAttribute('data-theme',theme);document.getElementById('themeBtn').textContent=theme==='dark'?'Dark':'Light';if(!location.hash){const last=localStorage.getItem('ait_shell_page');location.hash='#'+(last&&isAllowed(last)?last:getPageFromHash());}else loadPage(getPageFromHash());})();
</script>
</body>
</html>
