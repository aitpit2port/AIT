<style>

-allowed}.tb-btn.primary.spinning svg{animation:spin .8s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}.filterbar{background:var(--card);border-bottom:1px solid var(--border);padding:8px 16px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}.fl{font-size:10px;font-weight:800;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;white-space:nowrap}.fs,.date-wrap input{background:var(--card2);border:1.5px solid var(--border);border-radius:6px;padding:6px 9px;font-size:11px;color:var(--text);cursor:pointer;outline:none;font-family:inherit}.fs{min-width:128px}.fs:focus,.date-wrap input:focus{border-color:var(--accent)}.date-wrap{display:flex;align-items:center;gap:5px}.date-sep{font-size:10px;color:var(--text2)}.btn-clear{background:none;border:1.5px solid var(--border);border-radius:6px;padding:6px 10px;font-size:11px;color:var(--text2);cursor:pointer;transition:.2s;margin-left:auto;font-family:inherit}.btn-clear:hover{border-color:var(--red);color:var(--red)}.active-badge{background:var(--accent);color:#fff;border-radius:4px;padding:2px 7px;font-size:10px;font-weight:800}.content{padding:14px 16px 72px}.kpi-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:10px;margin-bottom:14px}@media(max-width:1280px){.kpi-grid{grid-template-columns:repeat(4,1fr)}}@media(max-width:700px){.kpi-grid{grid-template-columns:repeat(2,1fr)}}.kc{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;border-top:3px solid transparent;transition:.2s}.kc:hover{transform:translateY(-2px);box-shadow:var(--shadow)}.kc.orange{border-top-color:var(--accent)}.kc.green{border-top-color:var(--green)}.kc.red{border-top-color:var(--red)}.kc.blue{border-top-color:var(--blue)}.kc.yellow{border-top-color:var(--yellow)}.kc.purple{border-top-color:var(--purple)}.kc-lbl{font-size:9px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;color:var(--text2);margin-bottom:6px}.kc-val{font-size:22px;font-weight:900;line-height:1}.kc-val.orange{color:var(--accent)}.kc-val.green{color:var(--green)}.kc-val.red{color:var(--red)}.kc-val.blue{color:var(--blue)}.kc-val.yellow{color:var(--yellow)}.kc-val.purple{color:var(--purple)}.kc-note{font-size:10px;color:var(--text2);margin-top:4px}.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:12px}.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}.g1{margin-bottom:12px}@media(max-width:980px){.g3,.g2{grid-template-columns:1fr}}.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}.card-head{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}.card-head h3{font-size:12px;font-weight:800}.card-head span{font-size:10px;color:var(--text2)}.card-body{padding:12px 14px}.ch{position:relative}.ch.h180{height:180px}.ch.h220{height:220px}.ch.h260{height:260px}.tbl-wrap{overflow-x:auto;max-height:430px;overflow-y:auto}table{width:100%;border-collapse:collapse;font-size:11px}thead th{background:var(--card2);color:var(--accent);font-size:9px;font-weight:800;letter-spacing:.6px;text-transform:uppercase;padding:8px 12px;text-align:left;border-bottom:1px solid var(--border);white-space:nowrap;position:sticky;top:0;z-index:2}tbody td{padding:8px 12px;border-bottom:1px solid var(--border);color:var(--text);vertical-align:middle}tbody tr:hover td{background:var(--card2)}.td-r{text-align:right}.td-b{font-weight:800}.td-s{font-size:10px;color:var(--text2)}.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:800;white-space:nowrap}.badge.good{background:var(--greenbg);color:var(--green)}.badge.warn{background:var(--yellowbg);color:var(--yellow)}.badge.bad{background:var(--redbg);color:var(--red)}.badge.info{background:var(--bluebg);color:var(--blue)}.page-load{position:fixed;inset:0;background:rgba(11,17,24,.92);display:flex;align-items:center;justify-content:center;z-index:9999;backdrop-filter:blur(4px)}.page-load.hidden{display:none}.ld-spin{width:48px;height:48px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 14px}.ld-msg{font-size:13px;color:var(--text2);text-align:center}.statusbar{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--border);padding:5px 16px;display:flex;align-items:center;gap:10px;font-size:10px;color:var(--text2);z-index:50}.s-dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 5px var(--green)}.s-dot.red{background:var(--red);box-shadow:0 0 5px var(--red)}.s-dot.yellow{background:var(--yellow);box-shadow:0 0 5px var(--yellow)}.empty{padding:26px;text-align:center;color:var(--text2);font-size:12px}.mini-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.mini{background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:12px}.mini-title{font-size:10px;text-transform:uppercase;color:var(--text2);font-weight:800;margin-bottom:6px}.mini-val{font-size:18px;font-weight:900;color:var(--accent)}
</style>

<body>
<div class="page-load" id="pageLoad"><div><div class="ld-spin"></div><div class="ld-msg" id="ldMsg">Loading data...</div></div></div>
<div class="topbar">
  <div><div class="tb-title" id="pageTitle">Spare Parts Warehouse</div><div class="tb-sub" id="pageSub">Budget allocation, spending and remaining balances</div></div>
  <div class="tb-spacer"></div>
  <div class="tb-info" id="lastUpdate">—</div>
  <select class="tb-btn" id="langSel" onchange="setLang(this.value)"><option value="en">🌐 EN</option><option value="ar">🌐 عربي</option><option value="zh">🌐 中文</option></select>
  <button class="tb-btn" id="themeBtn" onclick="toggleTheme()">🌙</button>
  <button class="tb-btn" onclick="exportExcel()">📄 <span data-i18n="exportExcel">Export Excel</span></button>
  <button class="tb-btn primary" id="btnRefresh" onclick="refreshData()"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M1 4v6h6M23 20v-6h-6"/><path d="M20.49 9A9 9 0 005.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 013.51 15"/></svg><span data-i18n="refresh">Refresh</span></button>
</div>
<div class="filterbar">
  <span class="fl" data-i18n="category">Category</span><select class="fs" id="fCategory" onchange="applyFilters()"><option value="all">All</option></select>
  <span class="fl" data-i18n="mine">Mine</span><select class="fs" id="fMine" onchange="applyFilters()"><option value="all">All</option></select>
  <span class="fl" data-i18n="dateRange">Date Range</span><div class="date-wrap"><input type="date" id="fFrom" onchange="applyFilters()"><span class="date-sep">→</span><input type="date" id="fTo" onchange="applyFilters()"></div>
  <button class="btn-clear" onclick="clearFilters()">✕ <span data-i18n="clear">Clear</span></button><span class="active-badge" id="activeBadge" style="display:none"></span>
</div>
<div class="content">
  <div class="kpi-grid" id="kpiGrid"></div>
  <div class="g3">
    <div class="card"><div class="card-head"><h3>Budget vs Actual</h3><span></span></div><div class="card-body"><div class="ch h220"><canvas id="c1"></canvas></div></div></div>
    <div class="card"><div class="card-head"><h3>Spending by Category</h3><span></span></div><div class="card-body"><div class="ch h220"><canvas id="c2"></canvas></div></div></div>
    <div class="card"><div class="card-head"><h3>Monthly Burn</h3><span>Last 30</span></div><div class="card-body"><div class="ch h220"><canvas id="c3"></canvas></div></div></div>
  </div>
  <div class="card g1"><div class="card-head"><h3>Budget Lines</h3><span id="hTable"></span></div><div class="tbl-wrap"><table><thead id="tHead"><tr><th>Date</th><th>Mine</th><th>Batch</th><th>Category</th><th>Status</th><th class="td-r">Value</th></tr></thead><tbody id="tBody"></tbody></table></div></div>
</div>
<div class="statusbar"><div class="s-dot" id="sDot"></div><span id="sText">Connecting...</span><span style="margin-left:auto" id="sCount"></span></div>
<script>
Chart.register(ChartDataLabels);
const API_URL = 'https://script.google.com/macros/s/AKfycbxFJroZzKQT1N0c70ktzFISQkWIkT7w_pyi7eAFxuDPx88icN-WvT2IGkrJ8W-Lt1uz/exec';
const PAGE = {"title": {"en": "Spare Parts Warehouse", "ar": "نظرة عامة على الموازنة", "zh": "预算概览"}, "sub": {"en": "Budget allocation, spending and remaining balances", "ar": "توزيع الموازنة والمصروف والمتبقي", "zh": "预算分配、支出和余额"}, "module": "budget", "kpis": ["TOTAL BUDGET", "COMMITTED", "SPENT", "REMAINING", "VARIANCE", "UTILIZATION", "CATEGORIES", "LAST UPDATE"], "charts": ["Budget vs Actual", "Spending by Category", "Monthly Burn"], "table": "Budget Lines"};
const I18N = {en:{refresh:'Refresh',exportExcel:'Export Excel',all:'All',dateRange:'Date Range',status:'Status',category:'Category',mine:'Mine',from:'From',to:'To',clear:'Clear',loading:'Loading data...',noData:'No data available yet',apiNotReady:'API module is not ready yet',table:'Table',rows:'rows',lastUpdate:'Last update',live:'Live data'},ar:{refresh:'تحديث',exportExcel:'تصدير Excel',all:'الكل',dateRange:'الفترة الزمنية',status:'الحالة',category:'التصنيف',mine:'المنجم',from:'من',to:'إلى',clear:'مسح',loading:'جاري تحميل البيانات...',noData:'لا توجد بيانات متاحة حاليًا',apiNotReady:'واجهة البيانات لهذه الصفحة لم تجهز بعد',table:'الجدول',rows:'صفوف',lastUpdate:'آخر تحديث',live:'بيانات مباشرة'},zh:{refresh:'刷新',exportExcel:'导出 Excel',all:'全部',dateRange:'日期范围',status:'状态',category:'分类',mine:'矿区',from:'从',to:'到',clear:'清除',loading:'正在加载数据...',noData:'暂无可用数据',apiNotReady:'此页面的数据接口尚未准备好',table:'表格',rows:'行',lastUpdate:'最后更新',live:'实时数据'}};
let LANG=localStorage.getItem('ait_lang')||'en';let THEME=localStorage.getItem('ait_theme')||'dark';let RAW=null,ROWS=[],FILTERED=[],CHARTS={};
const PAL=['#fd480e','#22c55e','#38bdf8','#f59e0b','#a78bfa','#ec4899','#14b8a6','#f97316','#84cc16','#06b6d4','#8b5cf6','#10b981'];
function tr(k){return (I18N[LANG]&&I18N[LANG][k])||I18N.en[k]||k}function tx(obj){return (obj&&obj[LANG])||obj?.en||obj||''}function num(v){let x=parseFloat(v||0);return isNaN(x)?0:x}function fmt(v){v=num(v);return v>=1e6?(v/1e6).toFixed(1)+'M':v>=1e3?(v/1e3).toFixed(1)+'K':(Number.isInteger(v)?v:v.toFixed(1))}function asDate(v){if(!v)return '';return String(v).slice(0,10)}
function applyI18n(){document.querySelectorAll('[data-i18n]').forEach(el=>el.textContent=tr(el.getAttribute('data-i18n')));document.getElementById('pageTitle').textContent=tx(PAGE.title);document.getElementById('pageSub').textContent=tx(PAGE.sub);document.documentElement.lang=LANG;document.documentElement.dir=LANG==='ar'?'rtl':'ltr';document.getElementById('langSel').value=LANG;populateFilters();render();}
function setLang(l){LANG=l;localStorage.setItem('ait_lang',l);applyI18n()}function toggleTheme(){THEME=THEME==='dark'?'light':'dark';localStorage.setItem('ait_theme',THEME);document.documentElement.setAttribute('data-theme',THEME);document.getElementById('themeBtn').textContent=THEME==='dark'?'🌙':'☀️';renderCharts()}
function apiCall(module,action='data'){return new Promise((resolve,reject)=>{const cb='ait_'+Date.now()+'_'+Math.random().toString(36).slice(2);const s=document.createElement('script');let done=false;const cleanup=()=>{done=true;delete window[cb];if(s.parentNode)s.parentNode.removeChild(s)};window[cb]=data=>{cleanup();resolve(data)};s.onerror=()=>{if(!done){cleanup();reject(new Error('Connection failed'))}};setTimeout(()=>{if(!done){cleanup();reject(new Error('Timeout'))}},30000);s.src=API_URL+'?module='+encodeURIComponent(module)+'&action='+encodeURIComponent(action)+'&callback='+cb+'&t='+Date.now();document.body.appendChild(s)})}
async function loadData(action='data'){setStatus('yellow',tr('loading'));document.getElementById('ldMsg').textContent=tr('loading');document.getElementById('pageLoad').classList.remove('hidden');try{if(PAGE.mode==='multi'){const [s,p]=await Promise.allSettled([apiCall('samples',action),apiCall('production',action)]);RAW={quality:s.value&&s.value.quality,production:p.value&&p.value.production,lastUpdated:(s.value&&s.value.lastUpdated)||(p.value&&p.value.lastUpdated)||new Date().toLocaleString()};ROWS=buildExecRows(RAW);}else{const res=await apiCall(PAGE.module,action);if(res.error)throw new Error(res.message||tr('apiNotReady'));RAW=res;ROWS=extractRows(res);}applyFilters();document.getElementById('lastUpdate').textContent='🕐 '+((RAW&&RAW.lastUpdated)||new Date().toLocaleString());setStatus('ok',tr('live')+' — '+FILTERED.length+' '+tr('rows'))}catch(e){console.warn(e);RAW=null;ROWS=[];FILTERED=[];render();setStatus('error',e.message||tr('apiNotReady'));document.getElementById('lastUpdate').textContent='🕐 '+new Date().toLocaleString()}finally{document.getElementById('pageLoad').classList.add('hidden')}}
async function refreshData(){const btn=document.getElementById('btnRefresh');btn.disabled=true;btn.classList.add('spinning');await loadData('sync');btn.disabled=false;btn.classList.remove('spinning')}
function extractRows(res){if(!res)return[];const keys=[PAGE.module,'data','rows','items','records','table'];for(const k of keys){if(Array.isArray(res[k]))return res[k];if(res[k]&&Array.isArray(res[k].rows))return res[k].rows;if(res[k]&&Array.isArray(res[k].items))return res[k].items}return[]}
function buildExecRows(raw){let rows=[];(raw.production?.lots||[]).forEach(r=>rows.push({type:'Production',date:r.date,mine:r.mine,batch:r.batch,category:r.stage,qty:r.mine_qty_ton,fe:r.avg_fe_pct,status:r.stage}));(raw.quality?.samples||[]).forEach(r=>rows.push({type:'Sample',date:r.date,mine:r.mine,batch:r.batch,category:r.pass_fail,qty:'',fe:r.Fe,status:r.pass_fail}));return rows.sort((a,b)=>String(b.date||'').localeCompare(String(a.date||''))).slice(0,300)}
function populateFilters(){const cat=document.getElementById('fCategory'),mine=document.getElementById('fMine');if(!cat||!mine)return;const curC=cat.value||'all',curM=mine.value||'all';const cats=[...new Set(ROWS.map(r=>r.category||r.status||r.type||r.department||r.vendor_status).filter(Boolean))].sort();const mines=[...new Set(ROWS.map(r=>r.mine||r.mine_name).filter(Boolean))].sort();cat.innerHTML='<option value="all">'+tr('all')+'</option>'+cats.map(x=>`<option value="${escapeHtml(x)}">${escapeHtml(x)}</option>`).join('');mine.innerHTML='<option value="all">'+tr('all')+'</option>'+mines.map(x=>`<option value="${escapeHtml(x)}">${escapeHtml(x)}</option>`).join('');cat.value=cats.includes(curC)?curC:'all';mine.value=mines.includes(curM)?curM:'all'}
function applyFilters(){const c=document.getElementById('fCategory')?.value||'all',m=document.getElementById('fMine')?.value||'all',df=document.getElementById('fFrom')?.value||'',dt=document.getElementById('fTo')?.value||'';FILTERED=ROWS.filter(r=>{const cat=r.category||r.status||r.type||r.department||r.vendor_status||'';const mine=r.mine||r.mine_name||'';const d=asDate(r.date||r.due_date||r.created_at||r.month);if(c!=='all'&&cat!==c)return false;if(m!=='all'&&mine!==m)return false;if(df&&d<df)return false;if(dt&&d>dt)return false;return true});const ac=[c,m,df,dt].filter(v=>v&&v!=='all').length;const badge=document.getElementById('activeBadge');badge.style.display=ac?'':'none';badge.textContent=ac+' active';render()}
function clearFilters(){['fCategory','fMine'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='all'});document.getElementById('fFrom').value='';document.getElementById('fTo').value='';applyFilters()}
function render(){renderKPIs();renderCharts();renderTable();document.getElementById('sCount').textContent=FILTERED.length+' / '+ROWS.length+' '+tr('rows')}
function renderKPIs(){const k=computeKPIs();document.getElementById('kpiGrid').innerHTML=PAGE.kpis.map((label,i)=>{const item=k[i]||{v:'—',n:''};const colors=['orange','blue','green','red','yellow','purple','blue','orange'];return `<div class="kc ${colors[i%colors.length]}"><div class="kc-lbl">${escapeHtml(label)}</div><div class="kc-val ${colors[i%colors.length]}">${escapeHtml(item.v)}</div><div class="kc-note">${escapeHtml(item.n||'')}</div></div>`}).join('')}
function computeKPIs(){if(PAGE.mode==='multi'&&RAW){const lots=RAW.production?.lots||[],samples=RAW.quality?.samples||[];const fe=samples.map(r=>num(r.Fe)).filter(x=>x>0);const pass=samples.filter(r=>String(r.pass_fail).toLowerCase()==='pass').length;const mineTon=lots.reduce((s,r)=>s+num(r.mine_qty_ton),0),portTon=lots.reduce((s,r)=>s+num(r.port_qty_ton),0);const mines=new Set([...lots.map(r=>r.mine),...samples.map(r=>r.mine)].filter(Boolean));return[{v:lots.length,n:'production lots'},{v:samples.length,n:'quality samples'},{v:fe.length?(fe.reduce((a,b)=>a+b,0)/fe.length).toFixed(1)+'%':'—',n:'average Fe'},{v:samples.length?(pass/samples.length*100).toFixed(1)+'%':'—',n:pass+' accepted'},{v:fmt(mineTon)+' t',n:'extracted'},{v:fmt(portTon)+' t',n:'at port'},{v:mines.size,n:'active'},{v:(RAW.lastUpdated||'—'),n:''}]}const nums=FILTERED.map(r=>num(r.amount||r.total||r.value||r.qty||r.cost||r.budget||r.score)).filter(x=>x>0);const total=nums.reduce((a,b)=>a+b,0);const done=FILTERED.filter(r=>/approved|paid|done|closed|active|pass|accepted/i.test(String(r.status||r.category||''))).length;const bad=FILTERED.filter(r=>/rejected|overdue|delayed|high|fail|black/i.test(String(r.status||r.category||''))).length;const mines=new Set(FILTERED.map(r=>r.mine||r.mine_name).filter(Boolean));const dates=FILTERED.map(r=>asDate(r.date||r.created_at||r.due_date||r.month)).filter(Boolean).sort();return[{v:FILTERED.length,n:'records'},{v:fmt(total),n:'numeric total'},{v:done,n:'positive/closed'},{v:bad,n:'alerts/issues'},{v:mines.size,n:'mines'},{v:nums.length?fmt(total/nums.length):'—',n:'average'},{v:dates[0]||'—',n:'first date'},{v:dates[dates.length-1]||'—',n:'latest'}]}
function gc(){const cs=getComputedStyle(document.documentElement);return{grid:cs.getPropertyValue('--chart-grid').trim(),txt:cs.getPropertyValue('--chart-txt').trim()}}function mkChart(id,type,labels,datasets,extra={}){if(CHARTS[id])CHARTS[id].destroy();const el=document.getElementById(id);if(!el)return;const {grid,txt}=gc();CHARTS[id]=new Chart(el,{type,data:{labels,datasets},options:{responsive:true,maintainAspectRatio:false,animation:{duration:280},plugins:{legend:{display:extra.legend??true,labels:{color:txt,boxWidth:10,font:{size:10}}},tooltip:{backgroundColor:'#07101f',borderColor:'#fd480e',borderWidth:1,titleColor:'#fd480e',bodyColor:'#e8ecf2',padding:10},datalabels:extra.datalabels??{display:false,color:'#fff',font:{weight:'bold',size:10}}},scales:(type==='doughnut'||type==='pie')?{}:{x:{stacked:extra.stacked||false,grid:{color:grid},ticks:{color:txt,font:{size:10},maxRotation:30}},y:{stacked:extra.stacked||false,grid:{color:grid},ticks:{color:txt,font:{size:10},callback:v=>fmt(v)}}}}})}
function renderCharts(){const has=FILTERED.length>0;const labels1=[],vals1=[];if(has){const group={};FILTERED.forEach(r=>{const k=r.mine||r.mine_name||r.category||r.status||r.type||'Other';group[k]=(group[k]||0)+num(r.qty||r.mine_qty_ton||r.amount||r.total||r.value||r.cost||1)});Object.keys(group).sort((a,b)=>group[b]-group[a]).slice(0,10).forEach(k=>{labels1.push(k);vals1.push(group[k])})}mkChart('c1','bar',labels1.length?labels1:['—'],vals1.length?[{label:PAGE.charts[0],data:vals1,backgroundColor:'rgba(253,72,14,.8)',borderRadius:5}]:[{label:PAGE.charts[0],data:[0],backgroundColor:'rgba(253,72,14,.2)'}],{legend:false});const cats={};FILTERED.forEach(r=>{const k=r.category||r.status||r.type||'Other';cats[k]=(cats[k]||0)+1});mkChart('c2','doughnut',Object.keys(cats).length?Object.keys(cats):['No data'],[{data:Object.values(cats).length?Object.values(cats):[1],backgroundColor:PAL.map(c=>c+'cc'),borderWidth:1}],{legend:true,datalabels:{display:false}});const daily={};FILTERED.forEach(r=>{const d=asDate(r.date||r.created_at||r.due_date||r.month);if(!d)return;daily[d]=(daily[d]||0)+num(r.qty||r.amount||r.value||r.cost||1)});const days=Object.keys(daily).sort().slice(-30);mkChart('c3','line',days.length?days:['—'],[{label:PAGE.charts[2],data:days.length?days.map(d=>daily[d]):[0],borderColor:'#fd480e',backgroundColor:'rgba(253,72,14,.1)',fill:true,tension:.35,pointRadius:3}],{legend:false,datalabels:{display:false}})}
function renderTable(){const body=document.getElementById('tBody');document.getElementById('hTable').textContent=FILTERED.length+' '+tr('rows');if(!FILTERED.length){body.innerHTML='<tr><td colspan="8" class="empty">'+tr('noData')+'<br><span style="color:var(--text3)">'+tr('apiNotReady')+'</span></td></tr>';return}const keys=pickKeys(FILTERED);body.innerHTML=FILTERED.slice(0,250).map(r=>`<tr>${keys.map(k=>formatCell(k,r[k])).join('')}</tr>`).join('');document.getElementById('tHead').innerHTML='<tr>'+keys.map(k=>'<th>'+escapeHtml(k.replace(/_/g,' '))+'</th>').join('')+'</tr>'}
function pickKeys(rows){const priority=['date','created_at','mine','mine_name','batch','category','status','type','amount','total','value','qty','cost','score','notes'];const all=[];rows.slice(0,50).forEach(r=>Object.keys(r||{}).forEach(k=>{if(!all.includes(k))all.push(k)}));return priority.filter(k=>all.includes(k)).concat(all.filter(k=>!priority.includes(k))).slice(0,8)}function formatCell(k,v){let cls=/amount|total|value|qty|cost|score|pct|rate|budget/i.test(k)?'td-r td-b':'td-s';let val=v==null||v===''?'—':String(v).slice(0,80);let badge=/status|category|type/i.test(k);return '<td class="'+cls+'">'+(badge?'<span class="badge info">'+escapeHtml(val)+'</span>':escapeHtml(val))+'</td>'}function escapeHtml(s){return String(s??'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]))}
function exportExcel(){if(!FILTERED.length){alert(tr('noData'));return}const wb=XLSX.utils.book_new();const ws=XLSX.utils.json_to_sheet(FILTERED);XLSX.utils.book_append_sheet(wb,ws,tx(PAGE.title).slice(0,30));XLSX.writeFile(wb,'AIT_'+PAGE.module+'_'+new Date().toISOString().slice(0,10)+'.xlsx')}function setStatus(type,msg){const dot=document.getElementById('sDot');dot.className='s-dot'+(type==='error'?' red':type==='yellow'?' yellow':'');document.getElementById('sText').textContent=msg}
window.addEventListener('DOMContentLoaded',()=>{document.documentElement.setAttribute('data-theme',THEME);document.getElementById('themeBtn').textContent=THEME==='dark'?'🌙':'☀️';document.getElementById('langSel').value=LANG;applyI18n();loadData('data')});
</script>
